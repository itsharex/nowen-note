name: Remove third-party image hosting

on:
  pull_request:
    types: [opened]

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: remove-third-party-image-hosting
  cancel-in-progress: false

jobs:
  remove:
    if: github.event.pull_request.head.ref == 'chore/remove-third-party-image-hosting-trigger'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Remove feature and compatibility surface
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import json
          import re

          def read(path: str) -> str:
              return Path(path).read_text(encoding="utf-8")

          def write(path: str, content: str) -> None:
              Path(path).write_text(content, encoding="utf-8")

          settings_path = "frontend/src/components/SettingsModal.tsx"
          settings = read(settings_path)
          replacements = [
              (", Image as ImageIcon", ""),
              ('import ImageHostingSettings from "@/components/settings/ImageHostingSettings";\n', ""),
              (' | "imageHosting"', ""),
              ('    { id: "imageHosting" as const, label: t(\'imageHosting.title\'), icon: ImageIcon },\n', ""),
              ('                  {activeTab === "imageHosting" && <ImageHostingSettings />}\n', ""),
          ]
          for old, new in replacements:
              if old not in settings:
                  raise SystemExit(f"{settings_path}: missing anchor {old!r}")
              settings = settings.replace(old, new, 1)
          write(settings_path, settings)

          api_path = "frontend/src/lib/api.impl.ts"
          api_source = read(api_path)
          pattern = re.compile(r"\n  // Image Hosting\n  imageHosting: \{.*?\n  \},\n\n  // Site Settings", re.S)
          api_source, changed = pattern.subn("\n  // Site Settings", api_source, count=1)
          if changed != 1:
              raise SystemExit(f"{api_path}: imageHosting API block not found")
          write(api_path, api_source)

          index_path = "backend/src/index.ts"
          index_source = read(index_path)
          for old in [
              'import imageHostingRouter from "./routes/image-hosting";\n',
              'app.route("/api/image-hosting", imageHostingRouter);\n',
          ]:
              if old not in index_source:
                  raise SystemExit(f"{index_path}: missing anchor {old!r}")
              index_source = index_source.replace(old, "", 1)
          write(index_path, index_source)

          calendar_path = "backend/src/services/calendar-export.ts"
          calendar = read(calendar_path)
          calendar = calendar.replace(
              "复用 image-hosting.ts 的 S3 签名逻辑，不新增 AWS SDK。",
              "使用内置的轻量 S3 签名逻辑，不新增 AWS SDK。",
          )
          calendar = calendar.replace(
              "// ====== 加密工具（复用 image-hosting.ts 逻辑） ======",
              "// ====== 加密工具 ======",
          )
          calendar = calendar.replace("IMAGE_HOSTING_ENCRYPTION_KEY", "CALENDAR_EXPORT_ENCRYPTION_KEY")
          write(calendar_path, calendar)

          for locale_path in [
              "frontend/src/i18n/locales/zh-CN.json",
              "frontend/src/i18n/locales/en.json",
          ]:
              data = json.loads(read(locale_path))
              if "imageHosting" not in data:
                  raise SystemExit(f"{locale_path}: imageHosting namespace not found")
              del data["imageHosting"]
              write(locale_path, json.dumps(data, ensure_ascii=False, indent=2) + "\n")

          textual_paths = [
              "README.md",
              "README.en.md",
              ".env.example",
              "docs/tutorials/quick-start.md",
              ".github/workflows/pg-sync-main.yml",
              ".github/workflows/pg-final-sync.yml",
              ".github/workflows/pg-diagnose-note-split.yml",
          ]
          for text_path in textual_paths:
              path = Path(text_path)
              if not path.exists():
                  continue
              text = read(text_path)
              text = text.replace("IMAGE_HOSTING_ENCRYPTION_KEY", "CALENDAR_EXPORT_ENCRYPTION_KEY")
              text = text.replace("、第三方图床", "")
              text = text.replace("和第三方图床", "")
              text = text.replace(", third-party image hosting", "")
              text = text.replace(" and third-party image hosting", "")
              text = text.replace(", and third-party image hosts", "")
              text = text.replace(" and third-party image hosts", "")
              text = text.replace("加密第三方图床密钥", "加密日历 S3 镜像导出凭据")
              text = text.replace("Encrypt third-party image-hosting credentials", "Encrypt calendar S3 mirror export credentials")
              filtered = []
              for line in text.splitlines():
                  if any(token in line for token in [
                      "backend/src/routes/image-hosting.ts",
                      "backend/src/services/image-hosting.ts",
                      "backend/src/services/image-hosting-policy.ts",
                      "backend/tests/image-hosting-settings-pg.test.ts",
                      "tests/image-hosting-settings-pg.test.ts",
                  ]):
                      continue
                  filtered.append(line)
              text = "\n".join(filtered) + ("\n" if text.endswith("\n") else "")
              text = text.replace(" including image hosting settings", "")
              text = text.replace("、图床设置", "")
              write(text_path, text)

          delete_paths = [
              "frontend/src/components/settings/ImageHostingSettings.tsx",
              "frontend/src/lib/__tests__/imageHostingRetirement.test.ts",
              "backend/src/routes/image-hosting.ts",
              "backend/tests/image-hosting-retirement.test.ts",
              "docs/image-hosting-retirement.md",
          ]
          for file_path in delete_paths:
              path = Path(file_path)
              if path.exists():
                  path.unlink()

          forbidden = {
              "frontend/src/components/SettingsModal.tsx": ["imageHosting", "ImageHostingSettings", "ImageIcon"],
              "frontend/src/lib/api.impl.ts": ["imageHosting:", "/image-hosting"],
              "backend/src/index.ts": ["imageHostingRouter", "/api/image-hosting"],
              "backend/src/services/calendar-export.ts": ["IMAGE_HOSTING_ENCRYPTION_KEY", "image-hosting.ts"],
          }
          for file_path, tokens in forbidden.items():
              source = read(file_path)
              found = [token for token in tokens if token in source]
              if found:
                  raise SystemExit(f"{file_path}: forbidden remnants {found}")
          for file_path in delete_paths:
              if Path(file_path).exists():
                  raise SystemExit(f"{file_path}: expected deleted")
          PY

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            backend/package-lock.json

      - name: Validate frontend
        working-directory: frontend
        run: |
          npm ci --no-audit --no-fund
          npm run build

      - name: Validate backend
        working-directory: backend
        run: |
          npm ci --no-audit --no-fund
          npm run build:tsc -- --noEmit

      - name: Commit removal and self-clean
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm -f --ignore-unmatch \
            .github/remove-image-hosting-trigger \
            .github/workflows/remove-image-hosting.yml
          git add -A
          git commit -m "refactor(attachments): remove third-party image hosting"
          git push origin HEAD:main
          gh pr close "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --comment "第三方图床已从 main 完全移除。"
          gh issue close 392 --repo "$GITHUB_REPOSITORY" --reason completed || true
