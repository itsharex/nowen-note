name: Apply issue 313 outline navigation fix

on:
  push:
    branches:
      - main
    paths:
      - .github/scripts/apply_issue_313.py

permissions:
  contents: write

concurrency:
  group: issue-313-main
  cancel-in-progress: true

jobs:
  apply-and-validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Apply, test and commit
        shell: bash
        run: |
          set -o pipefail
          LOG="$GITHUB_WORKSPACE/.github/issue-313-validation.log"
          rm -f "$LOG"

          set +e
          {
            python "$GITHUB_WORKSPACE/.github/scripts/apply_issue_313.py"
            cd "$GITHUB_WORKSPACE/frontend"
            npm ci
            npm run test:run -- src/lib/__tests__/outlineScroll.test.ts
            npm run build
          } 2>&1 | tee "$LOG"
          status=${PIPESTATUS[0]}
          set -e

          cd "$GITHUB_WORKSPACE"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [ "$status" -ne 0 ]; then
            cp "$LOG" /tmp/issue-313-validation.log
            git reset --hard HEAD
            git clean -fd
            cp /tmp/issue-313-validation.log "$LOG"
            git add "$LOG"
            git commit -m "chore: record issue 313 validation failure" || true
            git push origin HEAD:main
            exit "$status"
          fi

          rm -f "$LOG"
          rm -f .github/scripts/apply_issue_313.py
          rm -f .github/workflows/issue-313-apply.yml
          rmdir .github/scripts 2>/dev/null || true

          git add -A
          git commit -m "fix(editor): stabilize outline heading navigation (#313)"
          git pull --rebase origin main
          git push origin HEAD:main
