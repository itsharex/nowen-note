name: Apply PG Yjs version fix

on:
  issue_comment:
    types: [created]

permissions:
  contents: write

jobs:
  patch:
    if: github.event.issue.number == 372 && github.event.issue.pull_request && github.event.comment.body == '/apply-pg-yjs-version-fix'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: pg-migration-unified
          fetch-depth: 0
      - name: Patch server replacement version timestamp
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('backend/src/services/yjs.ts')
          source = path.read_text()
          old = '''    room.updatesSinceSnapshot++;
              if (userId) room.lastActorUserId = userId;

              // 到达阈值顺手合并一次 snapshot，行为与 yApplyUpdate 对齐
          '''
          new = '''    room.updatesSinceSnapshot++;
              if (userId) room.lastActorUserId = userId;
              // The caller has already persisted and versioned the same canonical content.
              // Prevent an immediate yFlush from counting that server replacement as another edit.
              room.lastVersionBumpAt = Date.now();

              // 到达阈值顺手合并一次 snapshot，行为与 yApplyUpdate 对齐
          '''
          if old not in source:
              if 'room.lastVersionBumpAt = Date.now();' in source:
                  raise SystemExit(0)
              raise SystemExit('yReplaceContentAsUpdate patch anchor not found')
          path.write_text(source.replace(old, new, 1))
          PY
      - name: Install backend dependencies
        working-directory: backend
        run: npm ci --no-audit --no-fund
      - name: TypeScript
        working-directory: backend
        run: npm run build:tsc -- --noEmit
      - name: Commit fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/src/services/yjs.ts
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "fix(pg): avoid duplicate Yjs version bump after server replace"
          git push origin HEAD:pg-migration-unified
