name: Finalize PG image hosting settings

on:
  push:
    branches: [main]
    paths:
      - .github/pg-image-hosting-trigger

permissions:
  contents: write
  issues: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nowen
          POSTGRES_PASSWORD: nowen_ci_password
          POSTGRES_DB: nowen_note_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U nowen -d nowen_note_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      TEST_PG_DATABASE_URL: postgres://nowen:nowen_ci_password@127.0.0.1:5432/nowen_note_test
      DATABASE_URL: postgres://nowen:nowen_ci_password@127.0.0.1:5432/nowen_note_test
      IMAGE_HOSTING_ENCRYPTION_KEY: pg-image-hosting-test-key-2026
      GH_TOKEN: ${{ github.token }}
      STATUS_COMMENT_ID: "5042929483"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: pg-migration-unified
          fetch-depth: 0

      - name: Transform service and add PG coverage
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('backend/src/services/image-hosting.ts')
          source = path.read_text()
          pairs = [
            ('function readPersistedConfig(): (ImageHostingConfig & { updatedAt: string | null }) | null {', 'async function readPersistedConfigAsync(): Promise<(ImageHostingConfig & { updatedAt: string | null }) | null> {'),
            ('const row = systemSettingsRepository.get(SETTING_KEY);', 'const row = await systemSettingsRepository.getAsync(SETTING_KEY);'),
            ('export function readImageHostingConfigPublic(): ImageHostingConfigPublic {', 'export async function readImageHostingConfigPublic(): Promise<ImageHostingConfigPublic> {'),
            ('export function writeImageHostingConfig(input: WriteImageHostingConfigInput): ImageHostingConfigPublic {', 'export async function writeImageHostingConfig(input: WriteImageHostingConfigInput): Promise<ImageHostingConfigPublic> {'),
            ('export function deleteImageHostingConfig(): ImageHostingConfigPublic {', 'export async function deleteImageHostingConfig(): Promise<ImageHostingConfigPublic> {'),
            ('systemSettingsRepository.set(SETTING_KEY, JSON.stringify(config));', 'await systemSettingsRepository.setAsync(SETTING_KEY, JSON.stringify(config));'),
            ('systemSettingsRepository.delete(SETTING_KEY);', 'await systemSettingsRepository.deleteAsync(SETTING_KEY);'),
            ('export function isImageHostingEnabled(): boolean {', 'export async function isImageHostingEnabled(): Promise<boolean> {'),
          ]
          for old, new in pairs:
              if old in source:
                  source = source.replace(old, new, 1)
              elif new not in source:
                  raise SystemExit(f'missing transform anchor: {old}')
          source = source.replace('const cfg = readPersistedConfig();', 'const cfg = await readPersistedConfigAsync();')
          source = source.replace('const existing = readPersistedConfig();', 'const existing = await readPersistedConfigAsync();')
          source = source.replace('return readImageHostingConfigPublic();', 'return await readImageHostingConfigPublic();')
          forbidden = ['readPersistedConfig()', 'systemSettingsRepository.get(', 'systemSettingsRepository.set(', 'systemSettingsRepository.delete(']
          if any(item in source for item in forbidden):
              raise SystemExit('synchronous persistence remains in image-hosting service')
          path.write_text(source)

          Path('backend/tests/image-hosting-settings-pg.test.ts').write_text('''import assert from "node:assert/strict";
          import test from "node:test";

          const databaseUrl = process.env.TEST_PG_DATABASE_URL;
          const skip = !databaseUrl;

          test("PG image hosting settings use the runtime repository", { skip }, async () => {
            const { Pool } = await import("pg");
            const pool = new Pool({ connectionString: databaseUrl });
            const runtime = await import("../src/db/runtime");
            const keys = ["imageHosting:config", "imageHosting:fallbackToLocal"];
            process.env.IMAGE_HOSTING_ENCRYPTION_KEY = "pg-image-hosting-test-key-2026";

            await runtime.resetDatabaseRuntimeForTests();
            await runtime.initializeDatabase({
              env: { ...process.env, DB_DRIVER: "postgres", DATABASE_URL: databaseUrl },
              dependencies: {
                createPostgresPool: () => pool,
                logger: { log: () => undefined, warn: () => undefined },
              },
            });
            const { runPostgresMigrations } = await import("../src/db/postgres/migrations");
            await runPostgresMigrations();
            await pool.query('DELETE FROM system_settings WHERE key = ANY($1::text[])', [keys]);

            try {
              const hosting = await import("../src/services/image-hosting");
              const policy = await import("../src/services/image-hosting-policy");
              assert.equal(await policy.readImageHostingFallbackToLocal(), true);
              assert.equal(await policy.writeImageHostingFallbackToLocal(false), false);
              assert.equal(await policy.readImageHostingFallbackToLocal(), false);

              const first = await hosting.writeImageHostingConfig({
                enabled: true,
                endpoint: "https://s3.example.test/",
                region: "auto",
                bucket: "images",
                accessKeyId: "access-key",
                secretAccessKey: "secret-key",
                publicBaseUrl: "https://cdn.example.test/",
                pathPrefix: "/uploads/",
                usePathStyle: true,
                maxFileSizeMb: 12,
                allowedTypes: ["image/png"],
              });
              assert.equal(first.endpoint, "https://s3.example.test");
              assert.equal(first.publicBaseUrl, "https://cdn.example.test");
              assert.equal(first.pathPrefix, "uploads");
              assert.equal(first.secretAccessKeySet, true);
              assert.equal(await hosting.isImageHostingEnabled(), true);

              const raw = await pool.query('SELECT value FROM system_settings WHERE key = $1', ["imageHosting:config"]);
              const stored = JSON.parse(raw.rows[0].value);
              assert.match(stored.secretAccessKeyEnc, /^v1:/);
              assert.doesNotMatch(raw.rows[0].value, /secret-key/);

              const updated = await hosting.writeImageHostingConfig({
                enabled: true,
                endpoint: "https://s3.example.test",
                bucket: "images-v2",
                accessKeyId: "access-key",
                publicBaseUrl: "https://cdn.example.test",
              });
              assert.equal(updated.bucket, "images-v2");
              assert.equal(updated.secretAccessKeySet, true);

              const deleted = await hosting.deleteImageHostingConfig();
              assert.equal(deleted.enabled, false);
              assert.equal(await hosting.isImageHostingEnabled(), false);
              await policy.deleteImageHostingFallbackPolicy();
              assert.equal(await policy.readImageHostingFallbackToLocal(), true);
            } finally {
              await pool.query('DELETE FROM system_settings WHERE key = ANY($1::text[])', [keys]);
              await runtime.resetDatabaseRuntimeForTests();
            }
          });
          ''')

          ci_path = Path('.github/workflows/pg-runtime.yml')
          ci = ci_path.read_text()
          test_line = '          tests/image-hosting-settings-pg.test.ts\n'
          if test_line not in ci:
              anchor = '          tests/system-settings-repository-pg.test.ts\n'
              if anchor not in ci: raise SystemExit('PG test anchor missing')
              ci = ci.replace(anchor, anchor + test_line, 1)
          if '0008_note_split_tables.sql' not in ci:
              anchor = '          test -f dist/postgres/migrations/0007_note_import_origins.sql\n'
              if anchor not in ci: raise SystemExit('0008 packaging anchor missing')
              ci = ci.replace(anchor, '          test -f dist/postgres/migrations/0007_note_import_origins.sql &&\n          test -f dist/postgres/migrations/0008_note_split_tables.sql\n', 1)
          ci_path.write_text(ci)
          PY

      - name: Install dependencies
        working-directory: backend
        run: npm ci --no-audit --no-fund

      - name: Validate
        working-directory: backend
        run: |
          set -o pipefail
          npm run build:tsc -- --noEmit 2>&1 | tee /tmp/image-hosting.log
          npm run audit:sqlite-boundaries 2>&1 | tee -a /tmp/image-hosting.log
          npm run audit:pg-schema-parity 2>&1 | tee -a /tmp/image-hosting.log
          node --import tsx --test --test-concurrency=1 tests/image-hosting-settings-pg.test.ts 2>&1 | tee -a /tmp/image-hosting.log

      - name: Commit and push
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/src/services/image-hosting.ts backend/tests/image-hosting-settings-pg.test.ts .github/workflows/pg-runtime.yml
          git commit -m "refactor(pg): finalize image hosting runtime settings"
          git push origin HEAD:pg-migration-unified
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Publish success
        run: |
          gh api "repos/${GITHUB_REPOSITORY}/issues/comments/${STATUS_COMMENT_ID}" -X PATCH -f body="## ✅ image hosting settings migrated to Runtime Provider

Commit: \`${{ steps.commit.outputs.sha }}\`

TypeScript, SQLite boundary audit, schema parity and the real PostgreSQL image hosting test passed."

      - name: Publish failure
        if: failure()
        run: |
          { echo '## ❌ image hosting Runtime migration failed'; echo; echo "Run: \`${{ github.run_id }}\`"; echo; echo '```text'; tail -n 240 /tmp/image-hosting.log 2>/dev/null || true; echo '```'; } > /tmp/status.md
          gh api "repos/${GITHUB_REPOSITORY}/issues/comments/${STATUS_COMMENT_ID}" -X PATCH -f body="$(cat /tmp/status.md)"
