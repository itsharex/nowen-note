name: Sync main into PostgreSQL migration branch

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  sync:
    if: github.event.issue.number == 372 && github.event.issue.pull_request && github.event.comment.body == '/sync-main-into-pg'
    runs-on: ubuntu-latest
    timeout-minutes: 45

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nowen
          POSTGRES_PASSWORD: nowen_ci_password
          POSTGRES_DB: nowen_note_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nowen -d nowen_note_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    env:
      TEST_PG_DATABASE_URL: postgres://nowen:nowen_ci_password@127.0.0.1:5432/nowen_note_test
      DATABASE_URL: postgres://nowen:nowen_ci_password@127.0.0.1:5432/nowen_note_test
      GH_TOKEN: ${{ github.token }}
      STATUS_COMMENT_ID: "5042929483"

    steps:
      - uses: actions/checkout@v4
        with:
          ref: pg-migration-unified
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Merge latest main
        id: merge
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          echo "before=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "main=$(git rev-parse origin/main)" >> "$GITHUB_OUTPUT"
          git merge --no-ff --no-edit -X ours origin/main

          pg_parent=$(git rev-parse HEAD^1)
          git checkout "$pg_parent" -- \
            backend/src/lib/api-tokens.ts \
            backend/src/routes/tokens.ts \
            backend/src/repositories/apiTokensRepository.ts \
            backend/src/repositories/notebookShareLinksRepository.ts \
            backend/src/repositories/shareCommentsRepository.ts

          git rm -f .github/workflows/pg-sync-main.yml
          git commit --amend --no-edit
          echo "after=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci --no-audit --no-fund

      - name: TypeScript
        id: typecheck
        continue-on-error: true
        working-directory: backend
        shell: bash
        run: |
          set +e
          npm run build:tsc -- --noEmit 2>&1 | tee /tmp/typecheck.log
          exit ${PIPESTATUS[0]}

      - name: Publish typecheck diagnostics
        if: steps.typecheck.outcome == 'failure'
        shell: bash
        run: |
          {
            echo '## ❌ main synchronization typecheck failed'
            echo
            echo "Run: \`${{ github.run_id }}\`"
            echo
            echo '```text'
            tail -n 200 /tmp/typecheck.log
            echo '```'
          } > /tmp/status.md
          gh api "repos/${GITHUB_REPOSITORY}/issues/comments/${STATUS_COMMENT_ID}" -X PATCH -f body="$(cat /tmp/status.md)"

      - name: Stop after typecheck failure
        if: steps.typecheck.outcome == 'failure'
        run: exit 1

      - name: SQLite direct-access audit
        working-directory: backend
        run: npm run audit:sqlite-boundaries

      - name: PostgreSQL schema parity
        working-directory: backend
        run: npm run audit:pg-schema-parity

      - name: SQL dialect tests
        working-directory: backend
        run: node --import tsx --test --test-concurrency=1 tests/sql-dialect.test.ts

      - name: Full SQLite regression
        working-directory: backend
        env:
          DB_DRIVER: sqlite
          DATABASE_URL: ""
          TEST_PG_DATABASE_URL: ""
        run: npm run test:serial

      - name: Real PostgreSQL regression
        working-directory: backend
        run: >-
          node --import tsx --test --test-concurrency=1
          tests/postgres-migrations.test.ts
          tests/repository-batch-a-pg.test.ts
          tests/repository-batch-b-pg.test.ts
          tests/repository-permissions-pg.test.ts
          tests/repository-access-session-pg.test.ts
          tests/api-token-resources-pg.test.ts

      - name: Production backend bundle
        working-directory: backend
        run: npm run build

      - name: Verify migration resources
        working-directory: backend
        run: >-
          test -f dist/postgres/migrations/0004_notebook_members_unique.sql &&
          test -f dist/postgres/migrations/0005_api_token_resources.sql &&
          test -f dist/postgres/migrations/0006_share_capabilities.sql

      - name: Push synchronized branch
        run: git push origin HEAD:pg-migration-unified

      - name: Publish success
        if: success()
        shell: bash
        run: |
          {
            echo '## ✅ main synchronized into pg-migration-unified'
            echo
            echo "Before: \`${{ steps.merge.outputs.before }}\`"
            echo "Main: \`${{ steps.merge.outputs.main }}\`"
            echo "Merge head: \`${{ steps.merge.outputs.after }}\`"
            echo "Run: \`${{ github.run_id }}\`"
            echo
            echo 'TypeScript, SQLite audit, schema parity, SQL dialect, full SQLite regression, real PostgreSQL regression, production bundle, and migration packaging all passed.'
          } > /tmp/status.md
          gh api "repos/${GITHUB_REPOSITORY}/issues/comments/${STATUS_COMMENT_ID}" -X PATCH -f body="$(cat /tmp/status.md)"

      - name: Publish generic failure
        if: failure() && steps.typecheck.outcome != 'failure'
        shell: bash
        run: |
          {
            echo '## ❌ main synchronization failed'
            echo
            echo "A post-typecheck validation stage failed. The branch was not pushed. Run: \`${{ github.run_id }}\`."
          } > /tmp/status.md
          gh api "repos/${GITHUB_REPOSITORY}/issues/comments/${STATUS_COMMENT_ID}" -X PATCH -f body="$(cat /tmp/status.md)"
