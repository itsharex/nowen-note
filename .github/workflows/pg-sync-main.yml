name: Sync main into PostgreSQL migration branch

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  sync:
    if: github.event.issue.number == 372 && github.event.issue.pull_request && github.event.comment.body == '/sync-main-into-pg'
    runs-on: ubuntu-latest
    timeout-minutes: 50

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nowen
          POSTGRES_PASSWORD: nowen_ci_password
          POSTGRES_DB: nowen_note_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nowen -d nowen_note_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    env:
      TEST_PG_DATABASE_URL: postgres://nowen:nowen_ci_password@127.0.0.1:5432/nowen_note_test
      DATABASE_URL: postgres://nowen:nowen_ci_password@127.0.0.1:5432/nowen_note_test
      GH_TOKEN: ${{ github.token }}
      STATUS_COMMENT_ID: "5042929483"

    steps:
      - uses: actions/checkout@v4
        with:
          ref: pg-migration-unified
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Merge latest main
        id: merge
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          echo "before=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "main=$(git rev-parse origin/main)" >> "$GITHUB_OUTPUT"
          git merge --no-ff --no-edit -X ours origin/main

          pg_parent=$(git rev-parse HEAD^1)
          git checkout "$pg_parent" -- \
            backend/src/lib/api-tokens.ts \
            backend/src/lib/attachment-signed-url.ts \
            backend/src/routes/attachments.ts \
            backend/src/routes/tokens.ts \
            backend/src/repositories/apiTokensRepository.ts \
            backend/src/repositories/apiTokenSchemaRepository.ts \
            backend/src/repositories/attachmentSignedAccessRepository.ts \
            backend/src/repositories/memberQueryRepository.ts \
            backend/src/repositories/notebookShareLinksRepository.ts \
            backend/src/repositories/shareCommentsRepository.ts \
            backend/src/services/roundTripMarkdownExportJobs.ts \
            backend/tests/attachment-signed-url-boundary.test.ts \
            backend/tests/docker-hardened-entrypoint.test.ts \
            backend/tests/note-transfer-hardening.test.ts \
            backend/tests/note-transfer.test.ts \
            backend/tests/siyuan-issue-284-regression.test.ts

          python - <<'PY'
          from pathlib import Path

          import_path = Path("backend/src/services/nowenPackageImport.ts")
          import_source = import_path.read_text()
          old_notes_loop = '''  const notesFolder = zip.folder("notes");
            if (notesFolder) {
              for (const name of Object.keys(notesFolder.files)) {
                if (!name.endsWith("/meta.json")) continue;
          '''
          new_notes_loop = '''  const notesFolder = zip.folder("notes");
            if (notesFolder) {
              for (const name of Object.keys(notesFolder.files)) {
                if (!/^notes\\/[^/]+\\/meta\\.json$/.test(name)) continue;
          '''
          if old_notes_loop not in import_source:
              raise SystemExit("nowenPackageImport notes loop pattern not found")
          import_path.write_text(import_source.replace(old_notes_loop, new_notes_loop, 1))

          links_test_path = Path("backend/tests/note-links-repository-async.test.ts")
          links_test = links_test_path.read_text()
          old_replace_contract = '''  // Other user's link should still exist
            const otherLinks = getDb().prepare("SELECT * FROM note_links WHERE userId = ? AND sourceNoteId = ?").all(otherUser, NOTE_1) as any[];
            assert.equal(otherLinks.length, 1);
          '''
          new_replace_contract = '''  // Links are owned by the source note, so replacing the source removes legacy rows regardless of saver.
            const otherLinks = getDb().prepare("SELECT * FROM note_links WHERE userId = ? AND sourceNoteId = ?").all(otherUser, NOTE_1) as any[];
            assert.equal(otherLinks.length, 0);
          '''
          old_backlink_contract = '''  const backlinks = await noteLinksRepository.getBacklinksAsync(USER_ID, NOTE_1);
            assert.equal(backlinks.length, 0);
            clean();
          });
          '''
          new_backlink_contract = '''  const backlinks = await noteLinksRepository.getBacklinksAsync(USER_ID, NOTE_1);
            assert.equal(backlinks.length, 1);
            assert.equal(backlinks[0].sourceNoteId, NOTE_2);
            clean();
          });
          '''
          if old_replace_contract not in links_test:
              raise SystemExit("note links replace contract pattern not found")
          if old_backlink_contract not in links_test:
              raise SystemExit("note links backlink contract pattern not found")
          links_test = links_test.replace(old_replace_contract, new_replace_contract, 1)
          links_test = links_test.replace(old_backlink_contract, new_backlink_contract, 1)
          links_test_path.write_text(links_test)
          PY

          git add backend/src/services/nowenPackageImport.ts backend/tests/note-links-repository-async.test.ts
          git rm -f .github/workflows/pg-sync-main.yml
          git commit --amend --no-edit
          echo "after=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci --no-audit --no-fund

      - name: TypeScript
        id: typecheck
        continue-on-error: true
        working-directory: backend
        shell: bash
        run: |
          set +e
          npm run build:tsc -- --noEmit 2>&1 | tee /tmp/typecheck.log
          exit ${PIPESTATUS[0]}

      - name: Publish typecheck diagnostics
        if: steps.typecheck.outcome == 'failure'
        shell: bash
        run: |
          {
            echo '## ❌ main synchronization typecheck failed'
            echo
            echo "Run: \`${{ github.run_id }}\`"
            echo
            echo '```text'
            tail -n 200 /tmp/typecheck.log
            echo '```'
          } > /tmp/status.md
          gh api "repos/${GITHUB_REPOSITORY}/issues/comments/${STATUS_COMMENT_ID}" -X PATCH -f body="$(cat /tmp/status.md)"

      - name: Stop after typecheck failure
        if: steps.typecheck.outcome == 'failure'
        run: exit 1

      - name: SQLite direct-access audit
        id: sqlite_audit
        continue-on-error: true
        working-directory: backend
        shell: bash
        run: |
          set +e
          npm run audit:sqlite-boundaries 2>&1 | tee /tmp/sqlite-audit.log
          exit ${PIPESTATUS[0]}

      - name: Publish SQLite audit diagnostics
        if: steps.sqlite_audit.outcome == 'failure'
        shell: bash
        run: |
          {
            echo '## ❌ main synchronization SQLite boundary audit failed'
            echo
            echo "Run: \`${{ github.run_id }}\`"
            echo
            echo '```text'
            tail -n 240 /tmp/sqlite-audit.log
            echo '```'
          } > /tmp/status.md
          gh api "repos/${GITHUB_REPOSITORY}/issues/comments/${STATUS_COMMENT_ID}" -X PATCH -f body="$(cat /tmp/status.md)"

      - name: Stop after SQLite audit failure
        if: steps.sqlite_audit.outcome == 'failure'
        run: exit 1

      - name: PostgreSQL schema parity
        id: schema_parity
        continue-on-error: true
        working-directory: backend
        shell: bash
        run: |
          set +e
          npm run audit:pg-schema-parity 2>&1 | tee /tmp/schema-parity.log
          exit ${PIPESTATUS[0]}

      - name: Publish schema parity diagnostics
        if: steps.schema_parity.outcome == 'failure'
        shell: bash
        run: |
          {
            echo '## ❌ main synchronization PostgreSQL schema parity failed'
            echo
            echo "Run: \`${{ github.run_id }}\`"
            echo
            echo '```text'
            tail -n 260 /tmp/schema-parity.log
            echo '```'
          } > /tmp/status.md
          gh api "repos/${GITHUB_REPOSITORY}/issues/comments/${STATUS_COMMENT_ID}" -X PATCH -f body="$(cat /tmp/status.md)"

      - name: Stop after schema parity failure
        if: steps.schema_parity.outcome == 'failure'
        run: exit 1

      - name: SQL dialect tests
        working-directory: backend
        run: node --import tsx --test --test-concurrency=1 tests/sql-dialect.test.ts

      - name: Full SQLite regression
        id: sqlite_regression
        continue-on-error: true
        working-directory: backend
        env:
          DB_DRIVER: sqlite
          DATABASE_URL: ""
          TEST_PG_DATABASE_URL: ""
        shell: bash
        run: |
          set +e
          npm run test:serial 2>&1 | tee /tmp/sqlite-regression.log
          exit ${PIPESTATUS[0]}

      - name: Rerun failed SQLite files with full errors
        if: steps.sqlite_regression.outcome == 'failure'
        working-directory: backend
        shell: bash
        run: |
          : > /tmp/sqlite-failures-detailed.log
          sed -n 's/^  - \(.*\.test\.ts\)$/\1/p' /tmp/sqlite-regression.log | while read -r file; do
            echo "===== ${file} =====" >> /tmp/sqlite-failures-detailed.log
            set +e
            output=$(node --import tsx --import ./tests/setup-db-isolation.ts --test "tests/${file}" 2>&1)
            code=$?
            set -e
            echo "$output" | tail -n 70 >> /tmp/sqlite-failures-detailed.log
            echo "exit=${code}" >> /tmp/sqlite-failures-detailed.log
            echo >> /tmp/sqlite-failures-detailed.log
          done

      - name: Upload SQLite failure diagnostics
        if: steps.sqlite_regression.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: pg-sync-sqlite-failures-${{ github.run_id }}
          path: |
            /tmp/sqlite-regression.log
            /tmp/sqlite-failures-detailed.log
          if-no-files-found: error
          retention-days: 7

      - name: Publish SQLite regression diagnostics
        if: steps.sqlite_regression.outcome == 'failure'
        shell: bash
        run: |
          {
            echo '## ❌ main synchronization SQLite regression failed'
            echo
            echo "Run: \`${{ github.run_id }}\`"
            echo
            echo 'Detailed diagnostics are attached as a workflow artifact.'
            echo
            echo '```text'
            tail -n 420 /tmp/sqlite-failures-detailed.log
            echo '```'
          } > /tmp/status.md
          gh api "repos/${GITHUB_REPOSITORY}/issues/comments/${STATUS_COMMENT_ID}" -X PATCH -f body="$(cat /tmp/status.md)"

      - name: Stop after SQLite regression failure
        if: steps.sqlite_regression.outcome == 'failure'
        run: exit 1

      - name: Real PostgreSQL regression
        working-directory: backend
        run: >-
          node --import tsx --test --test-concurrency=1
          tests/postgres-migrations.test.ts
          tests/repository-batch-a-pg.test.ts
          tests/repository-batch-b-pg.test.ts
          tests/repository-permissions-pg.test.ts
          tests/repository-access-session-pg.test.ts
          tests/api-token-resources-pg.test.ts

      - name: Production backend bundle
        working-directory: backend
        run: npm run build

      - name: Verify migration resources
        working-directory: backend
        run: >-
          test -f dist/postgres/migrations/0004_notebook_members_unique.sql &&
          test -f dist/postgres/migrations/0005_api_token_resources.sql &&
          test -f dist/postgres/migrations/0006_share_capabilities.sql &&
          test -f dist/postgres/migrations/0007_note_import_origins.sql

      - name: Push synchronized branch
        run: git push origin HEAD:pg-migration-unified

      - name: Publish success
        if: success()
        shell: bash
        run: |
          {
            echo '## ✅ main synchronized into pg-migration-unified'
            echo
            echo "Before: \`${{ steps.merge.outputs.before }}\`"
            echo "Main: \`${{ steps.merge.outputs.main }}\`"
            echo "Merge head: \`${{ steps.merge.outputs.after }}\`"
            echo "Run: \`${{ github.run_id }}\`"
            echo
            echo 'TypeScript, SQLite audit, schema parity, SQL dialect, full SQLite regression, real PostgreSQL regression, production bundle, and migration packaging all passed.'
          } > /tmp/status.md
          gh api "repos/${GITHUB_REPOSITORY}/issues/comments/${STATUS_COMMENT_ID}" -X PATCH -f body="$(cat /tmp/status.md)"

      - name: Publish generic failure
        if: failure() && steps.typecheck.outcome != 'failure' && steps.sqlite_audit.outcome != 'failure' && steps.schema_parity.outcome != 'failure' && steps.sqlite_regression.outcome != 'failure'
        shell: bash
        run: |
          {
            echo '## ❌ main synchronization failed'
            echo
            echo "A later validation stage failed. The branch was not pushed. Run: \`${{ github.run_id }}\`."
          } > /tmp/status.md
          gh api "repos/${GITHUB_REPOSITORY}/issues/comments/${STATUS_COMMENT_ID}" -X PATCH -f body="$(cat /tmp/status.md)"
