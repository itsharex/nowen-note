name: Fix embedding queue recovery

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: write

concurrency:
  group: fix-embedding-queue
  cancel-in-progress: false

jobs:
  fix:
    if: github.event.pull_request.head.ref == 'chore/fix-embedding-queue-trigger'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Apply embedding queue fix
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          def read(path: str) -> str:
              return Path(path).read_text(encoding="utf-8-sig")

          def write(path: str, value: str) -> None:
              Path(path).write_text(value, encoding="utf-8")

          def replace_once(source: str, old: str, new: str, path: str) -> str:
              if old not in source:
                  raise SystemExit(f"{path}: missing anchor: {old[:120]!r}")
              return source.replace(old, new, 1)

          vec_path = "backend/src/services/vec-store.ts"
          vec = read(vec_path)
          vec = replace_once(
              vec,
              "let currentDim: number | null = null; // 当前 vec0 表使用的维度；未建表时为 null\n",
              "let currentDim: number | null = null; // 当前 vec0 表使用的维度；未建表时为 null\nlet loadError: string | null = null; // 最近一次扩展加载错误，供状态页诊断\n",
              vec_path,
          )
          vec = replace_once(
              vec,
              "    return { loaded, dim: currentDim };\n",
              "    return { loaded, dim: currentDim, ...(loadError ? { error: loadError } : {}) };\n",
              vec_path,
          )
          vec = replace_once(
              vec,
              "    sqliteVec.load(db);\n    loaded = true;\n",
              "    sqliteVec.load(db);\n    loaded = true;\n    loadError = null;\n",
              vec_path,
          )
          vec = replace_once(
              vec,
              "    const msg = e?.message || String(e);\n    console.warn(\"[vec-store] sqlite-vec load failed, falling back to BM25-only:\", msg);\n",
              "    const msg = e?.message || String(e);\n    loadError = msg;\n    console.warn(\"[vec-store] sqlite-vec load failed, falling back to BM25-only:\", msg);\n",
              vec_path,
          )
          vec = replace_once(
              vec,
              "export function getVecDim(): number | null {\n  return currentDim;\n}\n",
              "export function getVecDim(): number | null {\n  return currentDim;\n}\n\nexport interface VecStoreStatus {\n  loadAttempted: boolean;\n  loaded: boolean;\n  initialized: boolean;\n  dim: number | null;\n  error: string | null;\n}\n\n/** 提供给状态接口的只读运行时诊断，不触发重复加载。 */\nexport function getVecStoreStatus(): VecStoreStatus {\n  return {\n    loadAttempted,\n    loaded,\n    initialized: loaded && currentDim !== null,\n    dim: currentDim,\n    error: loadError,\n  };\n}\n",
              vec_path,
          )
          write(vec_path, vec)

          worker_path = "backend/src/services/embedding-worker.ts"
          worker = read(worker_path)
          worker = replace_once(
              worker,
              "  getVecDim,\n  clearAllVectors,\n",
              "  getVecDim,\n  getVecStoreStatus,\n  clearAllVectors,\n",
              worker_path,
          )
          worker = replace_once(
              worker,
              "    if (tasks.length === 0) return;\n",
              "    if (tasks.length === 0) {\n      await tickAttachments();\n      return;\n    }\n",
              worker_path,
          )
          worker = replace_once(
              worker,
              "        await sleep(500);\n      }\n    }\n  } catch (e) {\n",
              "        await sleep(500);\n      }\n    }\n\n    await tickAttachments();\n  } catch (e) {\n",
              worker_path,
          )
          worker = replace_once(
              worker,
              "\n  // ---- 附件任务：与笔记任务同一个 tick，共享 BATCH_SIZE 的\"大轮询\"节奏 ----\n  // 放在 finally 之外的独立 try/catch：笔记分支出错不影响附件分支，反之亦然。\n  await tickAttachments();\n}\n",
              "\n}\n",
              worker_path,
          )
          recovery = '''\n/**\n * 恢复上一次进程退出时遗留的 processing 任务。\n *\n * 当前 worker 是单进程串行模型；新进程启动时不可能仍有合法的旧 worker 持有任务，\n * 因此可以安全地把全部 processing 原子退回 pending，且不增加 provider 失败重试次数。\n */\nexport function recoverInterruptedEmbeddingJobs(): { notes: number; attachments: number } {\n  const db = getDb();\n  let notes = 0;\n  let attachments = 0;\n  const tx = db.transaction(() => {\n    notes = db.prepare(\n      `UPDATE embedding_queue\n          SET status = 'pending',\n              lastError = 'recovered: worker restarted during processing',\n              updatedAt = datetime('now')\n        WHERE status = 'processing'`,\n    ).run().changes;\n    attachments = db.prepare(\n      `UPDATE attachment_embedding_queue\n          SET status = 'pending',\n              lastError = 'recovered: worker restarted during processing',\n              updatedAt = datetime('now')\n        WHERE status = 'processing'`,\n    ).run().changes;\n  });\n  tx();\n  return { notes, attachments };\n}\n\n'''
          worker = replace_once(
              worker,
              "/** 启动 worker（幂等）。在 index.ts 启动时调用一次即可。 */\nexport function startEmbeddingWorker(): void {\n  if (timer) return;\n  stopped = false;\n",
              recovery + "/** 启动 worker（幂等）。在 index.ts 启动时调用一次即可。 */\nexport function startEmbeddingWorker(): void {\n  if (timer) return;\n  stopped = false;\n  const recovered = recoverInterruptedEmbeddingJobs();\n  if (recovered.notes > 0 || recovered.attachments > 0) {\n    console.warn(`[embedding-worker] recovered interrupted jobs: notes=${recovered.notes}, attachments=${recovered.attachments}`);\n  }\n",
              worker_path,
          )
          worker = replace_once(
              worker,
              "  vecAvailable: boolean;\n  vecDim: number | null;\n",
              "  vecAvailable: boolean;\n  vecLoaded: boolean;\n  vecLoadAttempted: boolean;\n  vecError: string | null;\n  vecDim: number | null;\n",
              worker_path,
          )
          worker = replace_once(
              worker,
              "  const db = getDb();\n  const cfg = readEmbeddingConfig(opts.userId);\n\n  const conds: string[] = [];\n",
              "  const db = getDb();\n  const cfg = readEmbeddingConfig(opts.userId);\n  const vecStatus = getVecStoreStatus();\n\n  const conds: string[] = [];\n",
              worker_path,
          )
          worker = replace_once(
              worker,
              "    vecAvailable: isVecAvailable(),\n    vecDim: getVecDim(),\n",
              "    vecAvailable: vecStatus.initialized,\n    vecLoaded: vecStatus.loaded,\n    vecLoadAttempted: vecStatus.loadAttempted,\n    vecError: vecStatus.error,\n    vecDim: vecStatus.dim,\n",
              worker_path,
          )
          write(worker_path, worker)

          route_path = "backend/src/routes/ai-reliable.ts"
          route = read(route_path)
          route = replace_once(
              route,
              "  const stale = pending > 0 || processing > 0 || (\n    !!newest.at && (!lastIndexed.at || Date.parse(newest.at) > Date.parse(lastIndexed.at))\n  );\n  return {\n",
              "  const stale = pending > 0 || processing > 0 || (\n    !!newest.at && (!lastIndexed.at || Date.parse(newest.at) > Date.parse(lastIndexed.at))\n  );\n  const vectorState = !stats.configured\n    ? \"not_configured\"\n    : stats.vecAvailable\n      ? \"ready\"\n      : !stats.vecLoaded\n        ? \"unavailable\"\n        : pending > 0 || processing > 0\n          ? \"initializing\"\n          : failed > 0\n            ? \"error\"\n            : \"waiting\";\n  return {\n",
              route_path,
          )
          route = replace_once(
              route,
              "    vectorAvailable: stats.vecAvailable,\n    vectorDimension: stats.vecDim,\n    stale,\n",
              "    vectorAvailable: stats.vecAvailable,\n    vectorState,\n    vectorError: stats.vecError,\n    vectorDimension: stats.vecDim,\n    stale,\n",
              route_path,
          )
          write(route_path, route)

          client_path = "frontend/src/lib/aiReliable.ts"
          client = read(client_path)
          client = replace_once(
              client,
              "    vectorAvailable: boolean;\n    vectorDimension: number | null;\n",
              "    vectorAvailable: boolean;\n    vectorState: \"not_configured\" | \"initializing\" | \"waiting\" | \"ready\" | \"unavailable\" | \"error\";\n    vectorError: string | null;\n    vectorDimension: number | null;\n",
              client_path,
          )
          write(client_path, client)

          panel_path = "frontend/src/components/EmbeddingSettingsPanel.tsx"
          panel = read(panel_path)
          panel = replace_once(
              panel,
              "      ready: \"Ready\",\n      unavailable: \"Unavailable\",\n",
              "      ready: \"Ready\",\n      initializing: \"Initializing\",\n      waiting: \"Waiting for first vector\",\n      degraded: \"Keyword search only\",\n      engineError: \"Indexing error\",\n      engineNotConfigured: \"Not configured\",\n",
              panel_path,
          )
          panel = replace_once(
              panel,
              "    ready: \"可用\",\n    unavailable: \"不可用\",\n",
              "    ready: \"可用\",\n    initializing: \"初始化中\",\n    waiting: \"等待首个向量\",\n    degraded: \"仅关键词检索\",\n    engineError: \"索引任务异常\",\n    engineNotConfigured: \"未配置\",\n",
              panel_path,
          )
          panel = replace_once(
              panel,
              "  const index = status?.index;\n  const busy = loading || saving || rebuilding;\n\n  return (\n",
              "  const index = status?.index;\n  const vectorState = index?.vectorState\n    || (index?.vectorAvailable ? \"ready\" : index?.configured && queuedJobs > 0 ? \"initializing\" : \"unavailable\");\n  const vectorLabel = vectorState === \"ready\"\n    ? copy.ready\n    : vectorState === \"initializing\"\n      ? copy.initializing\n      : vectorState === \"waiting\"\n        ? copy.waiting\n        : vectorState === \"error\"\n          ? copy.engineError\n          : vectorState === \"not_configured\"\n            ? copy.engineNotConfigured\n            : copy.degraded;\n  const busy = loading || saving || rebuilding;\n\n  return (\n",
              panel_path,
          )
          old_card = '''            <div className="rounded-xl bg-zinc-50 p-3 dark:bg-zinc-800/60">\n              <div className="text-[11px] text-zinc-500">{copy.vectorEngine}</div>\n              <div className={cn(\n                "mt-1 text-xs font-semibold",\n                index?.vectorAvailable ? "text-emerald-600 dark:text-emerald-400" : "text-amber-600 dark:text-amber-400",\n              )}>\n                {index?.vectorAvailable ? copy.ready : copy.unavailable}\n                {index?.vectorDimension ? ` · ${index.vectorDimension} ${copy.dimension}` : ""}\n              </div>\n            </div>'''
          new_card = '''            <div className="rounded-xl bg-zinc-50 p-3 dark:bg-zinc-800/60">\n              <div className="text-[11px] text-zinc-500">{copy.vectorEngine}</div>\n              <div className={cn(\n                "mt-1 text-xs font-semibold",\n                vectorState === "ready"\n                  ? "text-emerald-600 dark:text-emerald-400"\n                  : vectorState === "initializing" || vectorState === "waiting"\n                    ? "text-blue-600 dark:text-blue-400"\n                    : vectorState === "not_configured"\n                      ? "text-zinc-500 dark:text-zinc-400"\n                      : "text-amber-600 dark:text-amber-400",\n              )}>\n                {vectorLabel}\n                {index?.vectorDimension ? ` · ${index.vectorDimension} ${copy.dimension}` : ""}\n              </div>\n              {index?.vectorError && (\n                <div className="mt-1 truncate text-[10px] text-amber-600/80 dark:text-amber-400/80" title={index.vectorError}>\n                  {index.vectorError}\n                </div>\n              )}\n            </div>'''
          panel = replace_once(panel, old_card, new_card, panel_path)
          write(panel_path, panel)

          test_path = "backend/tests/embedding-user-ai-settings.test.ts"
          test_source = read(test_path)
          test_source = replace_once(
              test_source,
              "let stopEmbeddingWorker: typeof import(\"../src/services/embedding-worker\").stopEmbeddingWorker;\n",
              "let stopEmbeddingWorker: typeof import(\"../src/services/embedding-worker\").stopEmbeddingWorker;\nlet recoverInterruptedEmbeddingJobs: typeof import(\"../src/services/embedding-worker\").recoverInterruptedEmbeddingJobs;\n",
              test_path,
          )
          test_source = replace_once(
              test_source,
              "  stopEmbeddingWorker = worker.stopEmbeddingWorker;\n",
              "  stopEmbeddingWorker = worker.stopEmbeddingWorker;\n  recoverInterruptedEmbeddingJobs = worker.recoverInterruptedEmbeddingJobs;\n",
              test_path,
          )
          test_source += '''\n\ntest("worker recovery requeues interrupted note and attachment jobs", () => {\n  const db = getDb();\n  db.prepare("INSERT OR IGNORE INTO users (id, username, passwordHash) VALUES (?, ?, ?)")\n    .run("embed-recovery", "embed-recovery", "hash");\n  db.prepare("INSERT OR IGNORE INTO notebooks (id, userId, name) VALUES (?, ?, ?)")\n    .run("embed-recovery-notebook", "embed-recovery", "Recovery");\n  db.prepare("INSERT OR IGNORE INTO notes (id, userId, notebookId, title, contentText) VALUES (?, ?, ?, ?, ?)")\n    .run("embed-recovery-note", "embed-recovery", "embed-recovery-notebook", "Recovery title", "Recovery body is long enough");\n  db.prepare("UPDATE embedding_queue SET status = 'processing' WHERE noteId = ?")\n    .run("embed-recovery-note");\n  db.prepare(`INSERT OR REPLACE INTO attachment_embedding_queue\n    (attachmentId, userId, workspaceId, noteId, status, retries, enqueuedAt, updatedAt)\n    VALUES (?, ?, NULL, ?, 'processing', 0, datetime('now'), datetime('now'))`)\n    .run("embed-recovery-attachment", "embed-recovery", "embed-recovery-note");\n\n  const recovered = recoverInterruptedEmbeddingJobs();\n  assert.deepEqual(recovered, { notes: 1, attachments: 1 });\n  assert.equal(\n    (db.prepare("SELECT status FROM embedding_queue WHERE noteId = ?").get("embed-recovery-note") as { status: string }).status,\n    "pending",\n  );\n  assert.equal(\n    (db.prepare("SELECT status FROM attachment_embedding_queue WHERE attachmentId = ?").get("embed-recovery-attachment") as { status: string }).status,\n    "pending",\n  );\n});\n\ntest("attachment polling remains inside the worker running guard", () => {\n  const source = fs.readFileSync(path.resolve(process.cwd(), "src/services/embedding-worker.ts"), "utf8");\n  assert.doesNotMatch(source, /if \(tasks\.length === 0\) return;/);\n  assert.match(source, /if \(tasks\.length === 0\) \{\s*await tickAttachments\(\);\s*return;/);\n  const finalTick = source.indexOf("await tickAttachments();", source.indexOf("for (const task of tasks)"));\n  const releaseGuard = source.indexOf("running = false", finalTick);\n  assert.ok(finalTick >= 0 && releaseGuard > finalTick);\n});\n'''
          write(test_path, test_source)

          for path, forbidden in {
              worker_path: ["if (tasks.length === 0) return;"],
              panel_path: ["index?.vectorAvailable ? copy.ready : copy.unavailable"],
          }.items():
              source = read(path)
              for token in forbidden:
                  if token in source:
                      raise SystemExit(f"{path}: forbidden remnant {token!r}")
          PY

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Validate backend
        working-directory: backend
        run: |
          npm ci --no-audit --no-fund
          node --import tsx --import ./tests/setup-db-isolation.ts --test tests/embedding-user-ai-settings.test.ts
          npm run build:tsc -- --noEmit

      - name: Validate frontend
        working-directory: frontend
        run: |
          npm ci --no-audit --no-fund
          npm run build

      - name: Publish verified fix branch
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B chore/fix-embedding-queue-result
          git add \
            backend/src/services/vec-store.ts \
            backend/src/services/embedding-worker.ts \
            backend/src/routes/ai-reliable.ts \
            backend/tests/embedding-user-ai-settings.test.ts \
            frontend/src/lib/aiReliable.ts \
            frontend/src/components/EmbeddingSettingsPanel.tsx
          git commit -m "fix(ai): recover interrupted embedding queues"
          git push --force origin chore/fix-embedding-queue-result
