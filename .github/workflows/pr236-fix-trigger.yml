name: Apply PR 236 verified fix

on:
  issue_comment:
    types: [created]

permissions:
  contents: write

jobs:
  patch-test-and-commit:
    if: github.event.issue.pull_request && github.event.issue.number == 236 && github.event.comment.body == '/apply-pr236-heading-outline-fix'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/pr-236-markdown-outline-h6
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            backend/package-lock.json

      - name: Patch Markdown H4-H6 outline extraction
        shell: python
        run: |
          from pathlib import Path

          editor_path = Path("frontend/src/components/MarkdownEditor.tsx")
          source = editor_path.read_text(encoding="utf-8")

          old_signature = "function extractHeadings(view: EditorView): NoteEditorHeading[] {"
          new_signature = 'export function extractHeadings(view: Pick<EditorView, "state">): NoteEditorHeading[] {'
          if old_signature not in source:
              raise SystemExit("extractHeadings signature not found")
          source = source.replace(old_signature, new_signature, 1)

          old_limit = "if (level < 1 || level > 3) return;"
          new_limit = "if (level < 1 || level > 6) return;"
          if old_limit not in source:
              raise SystemExit("H1-H3 outline limit not found")
          source = source.replace(old_limit, new_limit, 1)
          editor_path.write_text(source, encoding="utf-8")

          test_path = Path("frontend/src/components/__tests__/MarkdownEditor.headingLevel.test.ts")
          test_path.write_text('''import { describe, expect, it } from "vitest";
          import { EditorState } from "@codemirror/state";
          import { markdown } from "@codemirror/lang-markdown";
          import {
            extractHeadings,
            normalizeFormatHeadingLevel,
          } from "../MarkdownEditor";

          describe("normalizeFormatHeadingLevel", () => {
            it("preserves heading levels 4-6 for desktop format menu events", () => {
              expect(normalizeFormatHeadingLevel(4)).toBe(4);
              expect(normalizeFormatHeadingLevel(5)).toBe(5);
              expect(normalizeFormatHeadingLevel(6)).toBe(6);
            });

            it("clamps out-of-range levels into the supported 1-6 range", () => {
              expect(normalizeFormatHeadingLevel(0)).toBe(1);
              expect(normalizeFormatHeadingLevel(9)).toBe(6);
            });
          });

          describe("Markdown editor outline", () => {
            it("extracts H1 and H4-H6 from the CodeMirror syntax tree", () => {
              const state = EditorState.create({
                doc: "# H1\\n\\n#### H4\\n\\n##### H5\\n\\n###### H6",
                extensions: [markdown()],
              });

              expect(extractHeadings({ state }).map(({ level, text }) => ({ level, text }))).toEqual([
                { level: 1, text: "H1" },
                { level: 4, text: "H4" },
                { level: 5, text: "H5" },
                { level: 6, text: "H6" },
              ]);
            });
          });
          '''.replace("          ", ""), encoding="utf-8")

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend heading regression tests
        working-directory: frontend
        run: npm run test:run -- src/components/__tests__/MarkdownEditor.headingLevel.test.ts src/lib/__tests__/contentFormat.test.ts src/lib/__tests__/shareOutline.test.ts src/lib/__tests__/htmlPreviewOutline.test.ts src/lib/__tests__/tiptapSchemaRepair.test.ts

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Run SiYuan heading fidelity test
        working-directory: backend
        run: node --import tsx --test tests/siyuan-package-tiptap-fidelity.test.ts

      - name: Check Electron scripts
        run: |
          node --check electron/menu.js
          node --check electron/preload.js

      - name: Commit verified fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm -f .github/workflows/pr236-heading-outline-fix.yml || true
          git add frontend/src/components/MarkdownEditor.tsx frontend/src/components/__tests__/MarkdownEditor.headingLevel.test.ts
          git commit -m "fix(markdown): include H4-H6 in editor outline (#236)"
          git push origin HEAD:fix/pr-236-markdown-outline-h6
