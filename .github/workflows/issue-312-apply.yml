name: Apply issue 312 fix

on:
  push:
    paths:
      - .github/workflows/issue-312-apply.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: issue-312-main
  cancel-in-progress: false

jobs:
  implement-and-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Apply table export normalization
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path

          root = Path.cwd()
          core_path = root / "frontend/src/lib/noteImageExportCore.ts"
          test_path = root / "frontend/src/lib/__tests__/noteImageExportCore.test.ts"
          helper_path = root / "frontend/src/lib/noteImageExportTables.ts"

          def replace_once(source: str, old: str, new: str, label: str) -> str:
              count = source.count(old)
              if count != 1:
                  raise RuntimeError(f"{label}: expected exactly one match, found {count}")
              return source.replace(old, new, 1)

          helper_source = r'''const WIDTH_ATTRIBUTES = ["width", "colwidth", "data-colwidth"] as const;

          function positiveInteger(value: string | null | undefined, fallback = 1): number {
            const parsed = Number.parseInt(value || "", 10);
            return Number.isFinite(parsed) && parsed > 0 ? parsed : fallback;
          }

          function parseWidthValues(value: string | null | undefined): number[] {
            if (!value) return [];
            return (value.match(/\d+(?:\.\d+)?/g) || [])
              .map((token) => Number.parseFloat(token))
              .filter((number) => Number.isFinite(number) && number > 0);
          }

          function readWidthValues(element: HTMLElement): number[] {
            const candidates = [
              element.getAttribute("data-colwidth"),
              element.getAttribute("colwidth"),
              element.getAttribute("width"),
              element.style.width,
              element.style.minWidth,
              element.style.maxWidth,
            ];
            for (const candidate of candidates) {
              const values = parseWidthValues(candidate);
              if (values.length) return values;
            }
            return [];
          }

          function logicalColumnCount(table: HTMLTableElement): number {
            let count = 0;
            const colCount = Array.from(table.querySelectorAll(":scope > colgroup > col"))
              .reduce((sum, col) => sum + positiveInteger(col.getAttribute("span")), 0);
            count = Math.max(count, colCount);

            for (const row of Array.from(table.rows)) {
              const rowCount = Array.from(row.cells)
                .reduce((sum, cell) => sum + positiveInteger(cell.getAttribute("colspan")), 0);
              count = Math.max(count, rowCount);
            }
            return Math.max(1, count);
          }

          function addHint(sums: number[], counts: number[], index: number, value: number): void {
            if (index < 0 || index >= sums.length || !Number.isFinite(value) || value <= 0) return;
            sums[index] += value;
            counts[index] += 1;
          }

          export function getExportTableColumnWeights(table: HTMLTableElement): number[] {
            const columnCount = logicalColumnCount(table);
            const sums = Array.from({ length: columnCount }, () => 0);
            const counts = Array.from({ length: columnCount }, () => 0);

            let colIndex = 0;
            for (const col of Array.from(table.querySelectorAll<HTMLElement>(":scope > colgroup > col"))) {
              const span = positiveInteger(col.getAttribute("span"));
              const values = readWidthValues(col);
              const width = values[0];
              for (let offset = 0; offset < span; offset += 1) {
                if (width) addHint(sums, counts, colIndex + offset, width);
              }
              colIndex += span;
            }

            for (const row of Array.from(table.rows)) {
              let cellIndex = 0;
              for (const cell of Array.from(row.cells)) {
                const span = positiveInteger(cell.getAttribute("colspan"));
                const explicitColumnWidths = [
                  ...parseWidthValues(cell.getAttribute("data-colwidth")),
                  ...parseWidthValues(cell.getAttribute("colwidth")),
                ];
                if (explicitColumnWidths.length >= span) {
                  for (let offset = 0; offset < span; offset += 1) {
                    addHint(sums, counts, cellIndex + offset, explicitColumnWidths[offset]);
                  }
                } else {
                  const width = readWidthValues(cell)[0];
                  if (width) {
                    const perColumn = width / span;
                    for (let offset = 0; offset < span; offset += 1) {
                      addHint(sums, counts, cellIndex + offset, perColumn);
                    }
                  }
                }
                cellIndex += span;
              }
            }

            const known = sums
              .map((sum, index) => counts[index] ? sum / counts[index] : 0)
              .filter((value) => value > 0)
              .sort((a, b) => a - b);
            const fallback = known.length ? known[Math.floor(known.length / 2)] : 1;
            return sums.map((sum, index) => counts[index] ? sum / counts[index] : fallback);
          }

          export function normalizeColumnWeights(weights: number[]): number[] {
            if (!weights.length) return [];
            const safe = weights.map((weight) => Number.isFinite(weight) && weight > 0 ? weight : 1);
            const total = safe.reduce((sum, weight) => sum + weight, 0) || safe.length;
            const percentages = safe.map((weight) => Number(((weight / total) * 100).toFixed(4)));
            const prior = percentages.slice(0, -1).reduce((sum, value) => sum + value, 0);
            percentages[percentages.length - 1] = Number(Math.max(0, 100 - prior).toFixed(4));
            return percentages;
          }

          function clearWidthSizing(element: HTMLElement): void {
            for (const attribute of WIDTH_ATTRIBUTES) element.removeAttribute(attribute);
            element.style.removeProperty("width");
            element.style.removeProperty("min-width");
            element.style.removeProperty("max-width");
          }

          function normalizeCellContents(table: HTMLTableElement, cell: HTMLTableCellElement): void {
            cell.querySelectorAll<HTMLElement>("[style], [width], [colwidth], [data-colwidth]")
              .forEach((element) => {
                if (element.closest("table") !== table) return;
                const media = /^(IMG|VIDEO|SVG|CANVAS)$/i.test(element.tagName);
                if (!media) clearWidthSizing(element);
                element.style.setProperty("max-width", "100%", "important");
                element.style.setProperty("min-width", "0", "important");
                element.style.setProperty("overflow-wrap", "anywhere", "important");
                element.style.setProperty("word-break", "break-word", "important");
                if (media) element.style.setProperty("height", "auto", "important");
              });
          }

          export function normalizeExportTable(table: HTMLTableElement): number[] {
            const percentages = normalizeColumnWeights(getExportTableColumnWeights(table));

            table.querySelectorAll(":scope > colgroup").forEach((colgroup) => colgroup.remove());
            const colgroup = table.ownerDocument.createElement("colgroup");
            percentages.forEach((percentage) => {
              const col = table.ownerDocument.createElement("col");
              col.style.setProperty("width", `${percentage}%`, "important");
              col.style.setProperty("min-width", "0", "important");
              col.style.setProperty("max-width", "none", "important");
              colgroup.appendChild(col);
            });
            const firstNonCaption = Array.from(table.children)
              .find((child) => child.tagName !== "CAPTION") || null;
            table.insertBefore(colgroup, firstNonCaption);

            clearWidthSizing(table);
            table.style.setProperty("width", "100%", "important");
            table.style.setProperty("max-width", "100%", "important");
            table.style.setProperty("min-width", "0", "important");
            table.style.setProperty("table-layout", "fixed", "important");
            table.style.setProperty("overflow-wrap", "anywhere", "important");
            table.dataset.exportTableNormalized = "true";

            for (const cell of Array.from(table.querySelectorAll<HTMLTableCellElement>("th, td"))) {
              clearWidthSizing(cell);
              cell.style.setProperty("width", "auto", "important");
              cell.style.setProperty("min-width", "0", "important");
              cell.style.setProperty("max-width", "none", "important");
              cell.style.setProperty("white-space", "normal", "important");
              cell.style.setProperty("overflow-wrap", "anywhere", "important");
              cell.style.setProperty("word-break", "break-word", "important");
              normalizeCellContents(table, cell);
            }

            return percentages;
          }

          export function normalizeExportTables(
            root: ParentNode,
            _availableWidth?: number,
          ): number {
            const tables = Array.from(root.querySelectorAll<HTMLTableElement>("table"));
            tables.forEach(normalizeExportTable);
            return tables.length;
          }

          export function findOverflowingExportTables(
            root: ParentNode,
            availableWidth: number,
            tolerance = 1,
          ): HTMLTableElement[] {
            return Array.from(root.querySelectorAll<HTMLTableElement>("table"))
              .filter((table) => {
                const parentWidth = table.parentElement?.clientWidth || availableWidth;
                if (parentWidth <= 0) return false;
                const visualWidth = table.getBoundingClientRect().width;
                return table.scrollWidth > parentWidth + tolerance
                  || visualWidth > parentWidth + tolerance;
              });
          }
          '''

          core = core_path.read_text(encoding="utf-8")
          core = replace_once(
              core,
              '''} from "@/lib/noteImageExportBridge";\n''',
              '''} from "@/lib/noteImageExportBridge";\nimport {\n  findOverflowingExportTables,\n  normalizeExportTables,\n} from "@/lib/noteImageExportTables";\n''',
              "table helper import",
          )
          core = replace_once(
              core,
              '''const EXPORT_WIDTH = 794;\n''',
              '''const EXPORT_WIDTH = 794;\nconst EXPORT_HORIZONTAL_PADDING = 56;\nconst EXPORT_CONTENT_WIDTH = EXPORT_WIDTH - EXPORT_HORIZONTAL_PADDING * 2;\n''',
              "export content width",
          )
          core = replace_once(
              core,
              '''    .nowen-note-image-export-body table { width: 100%; margin: 16px 0; border-collapse: collapse; table-layout: auto; font-size: 14px; }\n    .nowen-note-image-export-body th, .nowen-note-image-export-body td { border: 1px solid ${border}; padding: 8px 10px; vertical-align: top; }\n''',
              '''    .nowen-note-image-export-body table { width: 100% !important; max-width: 100% !important; min-width: 0 !important; margin: 16px 0; border-collapse: collapse; table-layout: fixed; font-size: 14px; overflow-wrap: anywhere; }\n    .nowen-note-image-export-body col { min-width: 0 !important; max-width: none !important; }\n    .nowen-note-image-export-body th, .nowen-note-image-export-body td { width: auto; min-width: 0 !important; max-width: none !important; border: 1px solid ${border}; padding: 8px 10px; vertical-align: top; white-space: normal !important; overflow-wrap: anywhere !important; word-break: break-word; }\n    .nowen-note-image-export-body th > *, .nowen-note-image-export-body td > * { max-width: 100% !important; min-width: 0 !important; overflow-wrap: anywhere !important; }\n''',
              "export table CSS",
          )
          core = replace_once(
              core,
              '''      "data-align", "data-type", "data-checked", "checked", "disabled", "colspan", "rowspan",\n''',
              '''      "data-align", "data-type", "data-checked", "checked", "disabled", "colspan", "rowspan",\n      "colwidth", "data-colwidth", "span",\n''',
              "table width sanitizer attributes",
          )
          core = replace_once(
              core,
              '''  body.className = "nowen-note-image-export-body";\n  body.innerHTML = bodyHtml || "";\n  highlightCodeBlocks(body);\n''',
              '''  body.className = "nowen-note-image-export-body";\n  body.innerHTML = bodyHtml || "";\n  normalizeExportTables(body, EXPORT_CONTENT_WIDTH);\n  highlightCodeBlocks(body);\n''',
              "table normalization hook",
          )
          core = replace_once(
              core,
              '''  await waitForHostAssets(host, failedResources);\n  const height = Math.max(120, Math.ceil(article.scrollHeight));\n''',
              '''  await waitForHostAssets(host, failedResources);\n  const overflowingTables = findOverflowingExportTables(body, EXPORT_CONTENT_WIDTH);\n  if (overflowingTables.length > 0) {\n    throw new Error(`有 ${overflowingTables.length} 个表格仍超出导出画布，已停止生成可能缺列的图片`);\n  }\n  const height = Math.max(120, Math.ceil(article.scrollHeight));\n''',
              "table overflow guard",
          )
          core_path.write_text(core, encoding="utf-8")
          helper_path.write_text(helper_source, encoding="utf-8")

          test = test_path.read_text(encoding="utf-8")
          test = replace_once(
              test,
              '''import { chooseRasterPlan, computePageSlices } from "@/lib/noteImageExportCore";\n''',
              '''import { chooseRasterPlan, computePageSlices } from "@/lib/noteImageExportCore";\nimport { noteContentToExportHtml } from "@/lib/exportService";\nimport {\n  findOverflowingExportTables,\n  normalizeExportTable,\n  normalizeExportTables,\n} from "@/lib/noteImageExportTables";\n''',
              "test imports",
          )
          test += r'''

          describe("note image export table normalization", () => {
            it("preserves all cells while scaling editor pixel widths into the export body", () => {
              const root = document.createElement("div");
              root.innerHTML = `
                <table style="width:1200px;min-width:1200px">
                  <colgroup>
                    <col style="width:800px;min-width:800px">
                    <col style="width:200px;min-width:200px">
                    <col style="width:200px;min-width:200px">
                  </colgroup>
                  <tbody>
                    <tr><th>发票内容</th><th>购买平台</th><th>是否开票</th></tr>
                    <tr><td style="width:800px;min-width:800px">广告机来回运费</td><td>货拉拉</td><td>未开发票</td></tr>
                  </tbody>
                </table>`;

              expect(normalizeExportTables(root, 682)).toBe(1);
              const table = root.querySelector("table")!;
              const cols = Array.from(table.querySelectorAll("col"));
              expect(cols).toHaveLength(3);
              expect(Number.parseFloat(cols[0].style.width)).toBeCloseTo(66.6667, 3);
              expect(Number.parseFloat(cols[1].style.width)).toBeCloseTo(16.6667, 3);
              expect(Number.parseFloat(cols[2].style.width)).toBeCloseTo(16.6666, 3);
              expect(table.textContent).toContain("购买平台");
              expect(table.textContent).toContain("是否开票");
              expect(table.style.getPropertyValue("table-layout")).toBe("fixed");
              expect(table.style.getPropertyPriority("width")).toBe("important");
              expect(table.querySelector("td")?.getAttribute("style")).not.toContain("800px");
            });

            it("uses colwidth hints, keeps merged-cell semantics and retains row height", () => {
              const root = document.createElement("div");
              root.innerHTML = `
                <table>
                  <tbody>
                    <tr style="height:72px">
                      <th colspan="2" colwidth="420,180">合并表头</th>
                      <th rowspan="2" data-colwidth="200">状态</th>
                    </tr>
                    <tr><td colwidth="420">内容</td><td colwidth="180">平台</td></tr>
                  </tbody>
                </table>`;
              const table = root.querySelector("table")!;
              const percentages = normalizeExportTable(table);

              expect(percentages).toHaveLength(3);
              expect(percentages[0]).toBeGreaterThan(percentages[1]);
              expect(table.querySelector("th")?.getAttribute("colspan")).toBe("2");
              expect(table.querySelector("th[rowspan]")?.getAttribute("rowspan")).toBe("2");
              expect(table.querySelector("tr")?.style.height).toBe("72px");
              expect(table.querySelector("[colwidth]")).toBeNull();
              expect(table.querySelector("[data-colwidth]")).toBeNull();
            });

            it("keeps every column in a wide twelve-column table", () => {
              const root = document.createElement("div");
              const cells = Array.from({ length: 12 }, (_, index) => `<td width="${index === 0 ? 600 : 100}px">列${index + 1}</td>`).join("");
              root.innerHTML = `<table><tbody><tr>${cells}</tr></tbody></table>`;
              normalizeExportTables(root, 682);

              const table = root.querySelector("table")!;
              expect(table.querySelectorAll("col")).toHaveLength(12);
              expect(table.querySelectorAll("td")).toHaveLength(12);
              expect(table.textContent).toContain("列12");
              const sum = Array.from(table.querySelectorAll("col"))
                .reduce((total, col) => total + Number.parseFloat((col as HTMLElement).style.width), 0);
              expect(sum).toBeCloseTo(100, 3);
            });

            it("detects a table that still exceeds its rendered parent", () => {
              const root = document.createElement("div");
              root.innerHTML = `<div><table><tbody><tr><td>内容</td></tr></tbody></table></div>`;
              const parent = root.firstElementChild as HTMLElement;
              const table = root.querySelector("table")!;
              Object.defineProperty(parent, "clientWidth", { configurable: true, value: 682 });
              Object.defineProperty(table, "scrollWidth", { configurable: true, value: 700 });
              table.getBoundingClientRect = () => ({
                x: 0, y: 0, top: 0, left: 0, right: 682, bottom: 100,
                width: 682, height: 100, toJSON: () => ({}),
              });
              expect(findOverflowingExportTables(root, 682)).toEqual([table]);
            });

            it("does not lose second and third columns during Tiptap JSON to HTML conversion", () => {
              const text = (value: string) => ({ type: "paragraph", content: [{ type: "text", text: value }] });
              const cell = (type: "tableHeader" | "tableCell", value: string, width: number) => ({
                type,
                attrs: { colspan: 1, rowspan: 1, colwidth: [width] },
                content: [text(value)],
              });
              const content = JSON.stringify({
                type: "doc",
                content: [{
                  type: "table",
                  content: [
                    { type: "tableRow", content: [
                      cell("tableHeader", "发票内容", 700),
                      cell("tableHeader", "购买平台", 200),
                      cell("tableHeader", "是否开票", 200),
                    ] },
                    { type: "tableRow", content: [
                      cell("tableCell", "广告机来回运费", 700),
                      cell("tableCell", "货拉拉", 200),
                      cell("tableCell", "未开发票", 200),
                    ] },
                  ],
                }],
              });

              const html = noteContentToExportHtml(content, "", "tiptap-json");
              expect(html).toContain("发票内容");
              expect(html).toContain("购买平台");
              expect(html).toContain("是否开票");
              expect((html.match(/<th/g) || [])).toHaveLength(3);
              expect((html.match(/<td/g) || [])).toHaveLength(3);
            });
          });
          '''
          test_path.write_text(test, encoding="utf-8")
          PY

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run export tests
        working-directory: frontend
        run: npm run test:run -- src/lib/__tests__/noteImageExportCore.test.ts

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Commit validated implementation to main
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/issue-312-apply.yml
          git add frontend/src/lib/noteImageExportCore.ts \
                  frontend/src/lib/noteImageExportTables.ts \
                  frontend/src/lib/__tests__/noteImageExportCore.test.ts
          git commit -m "fix(export): preserve wide table columns in note images (#312)"
          git push origin HEAD:main
