name: Finalize PG image hosting settings

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write

jobs:
  migrate:
    if: github.event.issue.number == 372 && github.event.issue.pull_request && github.event.comment.body == '/finalize-pg-image-hosting-settings'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nowen
          POSTGRES_PASSWORD: nowen_ci_password
          POSTGRES_DB: nowen_note_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nowen -d nowen_note_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    env:
      TEST_PG_DATABASE_URL: postgres://nowen:nowen_ci_password@127.0.0.1:5432/nowen_note_test
      DATABASE_URL: postgres://nowen:nowen_ci_password@127.0.0.1:5432/nowen_note_test
      IMAGE_HOSTING_ENCRYPTION_KEY: pg-image-hosting-test-key-2026
      GH_TOKEN: ${{ github.token }}
      STATUS_COMMENT_ID: "5042929483"

    steps:
      - uses: actions/checkout@v4
        with:
          ref: pg-migration-unified
          fetch-depth: 0

      - name: Transform service and add tests
        id: transform
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          service_path = Path('backend/src/services/image-hosting.ts')
          service = service_path.read_text()
          replacements = [
            (
              'function readPersistedConfig(): (ImageHostingConfig & { updatedAt: string | null }) | null {',
              'async function readPersistedConfigAsync(): Promise<(ImageHostingConfig & { updatedAt: string | null }) | null> {',
            ),
            (
              'const row = systemSettingsRepository.get(SETTING_KEY);',
              'const row = await systemSettingsRepository.getAsync(SETTING_KEY);',
            ),
            (
              'export function readImageHostingConfigPublic(): ImageHostingConfigPublic {',
              'export async function readImageHostingConfigPublic(): Promise<ImageHostingConfigPublic> {',
            ),
            (
              'export function writeImageHostingConfig(input: WriteImageHostingConfigInput): ImageHostingConfigPublic {',
              'export async function writeImageHostingConfig(input: WriteImageHostingConfigInput): Promise<ImageHostingConfigPublic> {',
            ),
            (
              'export function deleteImageHostingConfig(): ImageHostingConfigPublic {',
              'export async function deleteImageHostingConfig(): Promise<ImageHostingConfigPublic> {',
            ),
            (
              'systemSettingsRepository.set(SETTING_KEY, JSON.stringify(config));',
              'await systemSettingsRepository.setAsync(SETTING_KEY, JSON.stringify(config));',
            ),
            (
              'systemSettingsRepository.delete(SETTING_KEY);',
              'await systemSettingsRepository.deleteAsync(SETTING_KEY);',
            ),
            (
              'export function isImageHostingEnabled(): boolean {',
              'export async function isImageHostingEnabled(): Promise<boolean> {',
            ),
          ]
          for old, new in replacements:
              if old in service:
                  service = service.replace(old, new, 1)
              elif new not in service:
                  raise SystemExit(f'missing image-hosting anchor: {old}')

          service = service.replace(
              'const cfg = readPersistedConfig();',
              'const cfg = await readPersistedConfigAsync();',
          )
          service = service.replace(
              'const existing = readPersistedConfig();',
              'const existing = await readPersistedConfigAsync();',
          )
          service = service.replace(
              'return readImageHostingConfigPublic();',
              'return await readImageHostingConfigPublic();',
          )

          forbidden = [
              'readPersistedConfig()',
              'systemSettingsRepository.get(',
              'systemSettingsRepository.set(',
              'systemSettingsRepository.delete(',
          ]
          remaining = [item for item in forbidden if item in service]
          if remaining:
              raise SystemExit(f'sync image-hosting persistence remains: {remaining}')
          service_path.write_text(service)

          test_source = '''import assert from "node:assert/strict";
          import test from "node:test";

          const databaseUrl = process.env.TEST_PG_DATABASE_URL;
          const skip = !databaseUrl;

          test("PG image hosting settings use the runtime repository", { skip }, async () => {
            const { Pool } = await import("pg");
            const pool = new Pool({ connectionString: databaseUrl });
            const runtime = await import("../src/db/runtime");
            const keys = ["imageHosting:config", "imageHosting:fallbackToLocal"];

            process.env.IMAGE_HOSTING_ENCRYPTION_KEY = "pg-image-hosting-test-key-2026";
            await runtime.resetDatabaseRuntimeForTests();
            await runtime.initializeDatabase({
              env: { ...process.env, DB_DRIVER: "postgres", DATABASE_URL: databaseUrl },
              dependencies: {
                createPostgresPool: () => pool,
                logger: { log: () => undefined, warn: () => undefined },
              },
            });

            const { runPostgresMigrations } = await import("../src/db/postgres/migrations");
            await runPostgresMigrations();
            await pool.query('DELETE FROM system_settings WHERE key = ANY($1::text[])', [keys]);

            try {
              const hosting = await import("../src/services/image-hosting");
              const policy = await import("../src/services/image-hosting-policy");

              assert.equal(await policy.readImageHostingFallbackToLocal(), true);
              assert.equal(await policy.writeImageHostingFallbackToLocal(false), false);
              assert.equal(await policy.readImageHostingFallbackToLocal(), false);

              const first = await hosting.writeImageHostingConfig({
                enabled: true,
                endpoint: "https://s3.example.test/",
                region: "auto",
                bucket: "images",
                accessKeyId: "access-key",
                secretAccessKey: "secret-key",
                publicBaseUrl: "https://cdn.example.test/",
                pathPrefix: "/uploads/",
                usePathStyle: true,
                maxFileSizeMb: 12,
                allowedTypes: ["image/png"],
              });
              assert.equal(first.endpoint, "https://s3.example.test");
              assert.equal(first.publicBaseUrl, "https://cdn.example.test");
              assert.equal(first.pathPrefix, "uploads");
              assert.equal(first.secretAccessKeySet, true);
              assert.equal(await hosting.isImageHostingEnabled(), true);

              const raw = await pool.query(
                'SELECT value FROM system_settings WHERE key = $1',
                ["imageHosting:config"],
              );
              const stored = JSON.parse(raw.rows[0].value);
              assert.match(stored.secretAccessKeyEnc, /^v1:/);
              assert.doesNotMatch(raw.rows[0].value, /secret-key/);

              const updated = await hosting.writeImageHostingConfig({
                enabled: true,
                endpoint: "https://s3.example.test",
                bucket: "images-v2",
                accessKeyId: "access-key",
                publicBaseUrl: "https://cdn.example.test",
              });
              assert.equal(updated.bucket, "images-v2");
              assert.equal(updated.secretAccessKeySet, true);

              const deleted = await hosting.deleteImageHostingConfig();
              assert.equal(deleted.enabled, false);
              assert.equal(deleted.secretAccessKeySet, false);
              assert.equal(await hosting.isImageHostingEnabled(), false);

              await policy.deleteImageHostingFallbackPolicy();
              assert.equal(await policy.readImageHostingFallbackToLocal(), true);
            } finally {
              await pool.query('DELETE FROM system_settings WHERE key = ANY($1::text[])', [keys]);
              await runtime.resetDatabaseRuntimeForTests();
            }
          });
          '''
          Path('backend/tests/image-hosting-settings-pg.test.ts').write_text(test_source)

          workflow_path = Path('.github/workflows/pg-runtime.yml')
          workflow = workflow_path.read_text()
          test_line = '          tests/image-hosting-settings-pg.test.ts\n'
          if test_line not in workflow:
              anchor = '          tests/system-settings-repository-pg.test.ts\n'
              if anchor not in workflow:
                  raise SystemExit('pg-runtime image hosting test anchor missing')
              workflow = workflow.replace(anchor, anchor + test_line, 1)

          migration_line = '          test -f dist/postgres/migrations/0008_note_split_tables.sql\n'
          if migration_line not in workflow:
              anchor = '          test -f dist/postgres/migrations/0007_note_import_origins.sql\n'
              if anchor not in workflow:
                  raise SystemExit('pg-runtime 0008 packaging anchor missing')
              workflow = workflow.replace(
                  anchor,
                  '          test -f dist/postgres/migrations/0007_note_import_origins.sql &&\n' + migration_line,
                  1,
              )
          workflow_path.write_text(workflow)
          PY

      - name: Install dependencies
        working-directory: backend
        run: npm ci --no-audit --no-fund

      - name: Validate migration
        id: validate
        continue-on-error: true
        working-directory: backend
        shell: bash
        run: |
          set -o pipefail
          {
            echo '=== TypeScript ==='
            npm run build:tsc -- --noEmit
            echo '=== SQLite boundary audit ==='
            npm run audit:sqlite-boundaries
            echo '=== PostgreSQL schema parity ==='
            npm run audit:pg-schema-parity
            echo '=== Real PostgreSQL image hosting test ==='
            node --import tsx --test --test-concurrency=1 tests/image-hosting-settings-pg.test.ts
          } 2>&1 | tee /tmp/image-hosting-migration.log

      - name: Commit migration
        id: commit
        if: steps.validate.outcome == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            backend/src/services/image-hosting.ts \
            backend/tests/image-hosting-settings-pg.test.ts \
            .github/workflows/pg-runtime.yml
          git commit -m "refactor(pg): finalize image hosting runtime settings"
          git push origin HEAD:pg-migration-unified
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Publish result
        if: always()
        shell: bash
        run: |
          if [ "${{ steps.validate.outcome }}" = "success" ]; then
            {
              echo '## ✅ image hosting settings migrated to Runtime Provider'
              echo
              echo "Commit: \`${{ steps.commit.outputs.sha }}\`"
              echo
              echo 'TypeScript, SQLite boundary audit, schema parity and the real PostgreSQL image hosting test passed.'
            } > /tmp/status.md
          else
            {
              echo '## ❌ image hosting Runtime migration validation failed'
              echo
              echo "Run: \`${{ github.run_id }}\`"
              echo
              echo '```text'
              tail -n 260 /tmp/image-hosting-migration.log
              echo '```'
            } > /tmp/status.md
          fi
          gh api "repos/${GITHUB_REPOSITORY}/issues/comments/${STATUS_COMMENT_ID}" -X PATCH -f body="$(cat /tmp/status.md)"

      - name: Preserve validation failure
        if: steps.validate.outcome == 'failure'
        run: exit 1
