name: Apply issue 314

on:
  push:
    paths:
      - .github/issue-314-trigger.txt

permissions:
  contents: write

jobs:
  apply-and-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Apply UTC export timestamp fix
        shell: bash
        run: |
          set -Eeuo pipefail
          LOG=/tmp/issue-314.log
          exec > >(tee "$LOG") 2>&1

          cleanup_failure() {
            status=$?
            if [ "$status" -eq 0 ]; then
              return
            fi
            trap - EXIT
            git reset --hard HEAD
            rm -f .github/workflows/issue-314-apply.yml .github/issue-314-trigger.txt
            {
              echo "Issue #314 validation failed with status $status"
              echo
              tail -n 240 "$LOG" || true
            } > .github/issue-314-failure.log
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .github/issue-314-failure.log .github/workflows/issue-314-apply.yml .github/issue-314-trigger.txt
            git commit -m "chore: diagnose issue 314 implementation" || true
            git push origin HEAD:main || true
            exit "$status"
          }
          trap cleanup_failure EXIT

          python3 <<'PY'
          from pathlib import Path

          root = Path('.')
          core_path = root / 'frontend/src/lib/noteImageExportCore.ts'
          helper_path = root / 'frontend/src/lib/noteImageExportMeta.ts'
          test_path = root / 'frontend/src/lib/__tests__/noteImageExportMeta.test.ts'

          core = core_path.read_text(encoding='utf-8')

          import_anchor = '''import {
            findOverflowingExportTables,
            normalizeExportTables,
          } from "@/lib/noteImageExportTables";
          '''
          import_replacement = import_anchor + 'import { buildNoteImageExportTimeMeta } from "@/lib/noteImageExportMeta";\n'
          if core.count(import_anchor) != 1:
              raise RuntimeError(f'expected one table import anchor, found {core.count(import_anchor)}')
          core = core.replace(import_anchor, import_replacement, 1)

          old_meta = '''  if (note.createdAt || note.updatedAt) {
            const meta = document.createElement("div");
            meta.className = "nowen-note-image-export-meta";
            const parts: string[] = [];
            if (note.createdAt) parts.push(`创建：${new Date(note.createdAt).toLocaleString()}`);
            if (note.updatedAt) parts.push(`更新：${new Date(note.updatedAt).toLocaleString()}`);
            meta.textContent = parts.join("  ·  ");
            article.appendChild(meta);
          }
          '''
          new_meta = '''  const timeMeta = buildNoteImageExportTimeMeta({
            createdAt: note.createdAt,
            updatedAt: note.updatedAt,
          });
          if (timeMeta) {
            const meta = document.createElement("div");
            meta.className = "nowen-note-image-export-meta";
            meta.textContent = timeMeta;
            article.appendChild(meta);
          }
          '''
          if core.count(old_meta) != 1:
              raise RuntimeError(f'expected one export meta block, found {core.count(old_meta)}')
          core = core.replace(old_meta, new_meta, 1)
          if 'new Date(note.createdAt)' in core or 'new Date(note.updatedAt)' in core:
              raise RuntimeError('direct server timestamp parsing remains in image export core')
          core_path.write_text(core, encoding='utf-8')

          helper_path.write_text(r'''import { formatServerTime, parseServerTime } from "@/lib/dateTime";

export interface NoteImageExportTimeMetaInput {
  createdAt?: string | null;
  updatedAt?: string | null;
  /** Optional deterministic locale for tests or server-side rendering. */
  locale?: string | string[];
  /** Optional deterministic IANA time zone. Production defaults to the user's local zone. */
  timeZone?: string;
}

function formatExportServerTime(
  value: string | null | undefined,
  locale?: string | string[],
  timeZone?: string,
): string | null {
  if (!value) return null;

  // Normal application rendering should use the shared formatter directly so every
  // server timestamp follows the same SQLite/PostgreSQL parsing rules.
  if (!locale && !timeZone) {
    return formatServerTime(value, undefined, "") || null;
  }

  const parsed = parseServerTime(value);
  if (!parsed) return null;

  try {
    return parsed.toLocaleString(locale, timeZone ? { timeZone } : undefined);
  } catch {
    // Invalid locale/timeZone configuration must not turn a valid note export into an
    // Invalid Date label. Fall back to the user's normal locale and time zone.
    return parsed.toLocaleString();
  }
}

/**
 * Build the creation/update metadata shared by PNG, JPG, SVG, long-image and paginated
 * exports. Invalid timestamps are omitted instead of leaking "Invalid Date" or raw data.
 */
export function buildNoteImageExportTimeMeta({
  createdAt,
  updatedAt,
  locale,
  timeZone,
}: NoteImageExportTimeMetaInput): string {
  const parts: string[] = [];
  const created = formatExportServerTime(createdAt, locale, timeZone);
  const updated = formatExportServerTime(updatedAt, locale, timeZone);

  if (created) parts.push(`创建：${created}`);
  if (updated) parts.push(`更新：${updated}`);
  return parts.join("  ·  ");
}
''', encoding='utf-8')

          test_path.write_text(r'''import { describe, expect, it } from "vitest";
import { parseServerTime } from "@/lib/dateTime";
import { buildNoteImageExportTimeMeta } from "@/lib/noteImageExportMeta";

function compact(value: string): string {
  return value.replace(/[\s\u200e\u200f]/g, "");
}

describe("NOTE-EXPORT-TIME-01 image export timestamp regression", () => {
  it.each([
    ["SQLite datetime", "2026-07-16 02:56:52"],
    ["timezone-less ISO", "2026-07-16T02:56:52"],
    ["explicit UTC", "2026-07-16T02:56:52Z"],
    ["explicit UTC+8", "2026-07-16T10:56:52+08:00"],
  ])("parses %s as the same UTC instant", (_label, value) => {
    expect(parseServerTime(value)?.toISOString()).toBe("2026-07-16T02:56:52.000Z");
  });

  it("converts SQLite UTC timestamps to the requested local time exactly once", () => {
    const meta = compact(buildNoteImageExportTimeMeta({
      createdAt: "2026-07-16 01:00:00",
      updatedAt: "2026-07-16 02:56:52",
      locale: "zh-CN",
      timeZone: "Asia/Shanghai",
    }));

    expect(meta).toContain("创建：2026/7/169:00:00");
    expect(meta).toContain("更新：2026/7/1610:56:52");
  });

  it("does not apply a second offset to timestamps that already include a zone", () => {
    const utc = compact(buildNoteImageExportTimeMeta({
      updatedAt: "2026-07-16T02:56:52Z",
      locale: "zh-CN",
      timeZone: "Asia/Shanghai",
    }));
    const explicitOffset = compact(buildNoteImageExportTimeMeta({
      updatedAt: "2026-07-16T10:56:52+08:00",
      locale: "zh-CN",
      timeZone: "Asia/Shanghai",
    }));

    expect(utc).toBe(explicitOffset);
    expect(utc).toContain("10:56:52");
  });

  it("omits empty or invalid timestamps without rendering Invalid Date", () => {
    const meta = buildNoteImageExportTimeMeta({
      createdAt: "not-a-date",
      updatedAt: "",
      locale: "zh-CN",
      timeZone: "Asia/Shanghai",
    });

    expect(meta).toBe("");
    expect(meta).not.toContain("Invalid Date");
  });
});
''', encoding='utf-8')
          PY

          cd frontend
          npm ci
          npx vitest run src/lib/__tests__/noteImageExportMeta.test.ts src/lib/__tests__/noteImageExportCore.test.ts
          npm run build
          cd ..

          rm -f .github/workflows/issue-314-apply.yml .github/issue-314-trigger.txt .github/issue-314-failure.log
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/src/lib/noteImageExportCore.ts frontend/src/lib/noteImageExportMeta.ts frontend/src/lib/__tests__/noteImageExportMeta.test.ts .github/workflows/issue-314-apply.yml .github/issue-314-trigger.txt .github/issue-314-failure.log
          git commit -m "fix(export): restore local timestamps in note images (#314)"
          git push origin HEAD:main
          trap - EXIT
