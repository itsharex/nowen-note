name: Note Split CI

on:
  push:
    branches: [main]
    paths:
      - "backend/src/index.hardened.ts"
      - "backend/src/lib/noteSplit.ts"
      - "backend/src/lib/tiptapNoteSplit.ts"
      - "backend/src/runtime/note-split.ts"
      - "backend/src/runtime/note-split-selection.ts"
      - "backend/src/runtime/note-split-tiptap.ts"
      - "backend/src/runtime/task-stats-hardening.ts"
      - "backend/tests/note-split.test.ts"
      - "backend/tests/note-split-title.test.ts"
      - "backend/tests/tiptap-note-split.test.ts"
      - "backend/tests/tiptap-note-split-empty.test.ts"
      - "frontend/vite.config.ts"
      - "frontend/src/lib/noteSplit.ts"
      - "frontend/src/lib/tiptapNoteSplit.ts"
      - "frontend/src/lib/noteSplitApi.ts"
      - "frontend/src/lib/__tests__/noteSplit.test.ts"
      - "frontend/src/lib/__tests__/tiptapNoteSplit.test.ts"
      - "frontend/src/components/NoteSplitDialog.tsx"
      - "frontend/src/components/EditorPaneRuntime.tsx"
      - "frontend/src/components/__tests__/NoteSplitDialog.test.tsx"
      - ".github/workflows/note-split-ci.yml"
  pull_request:
    paths:
      - "backend/src/index.hardened.ts"
      - "backend/src/lib/noteSplit.ts"
      - "backend/src/lib/tiptapNoteSplit.ts"
      - "backend/src/runtime/note-split.ts"
      - "backend/src/runtime/note-split-selection.ts"
      - "backend/src/runtime/note-split-tiptap.ts"
      - "backend/src/runtime/task-stats-hardening.ts"
      - "backend/tests/note-split.test.ts"
      - "backend/tests/note-split-title.test.ts"
      - "backend/tests/tiptap-note-split.test.ts"
      - "backend/tests/tiptap-note-split-empty.test.ts"
      - "frontend/vite.config.ts"
      - "frontend/src/lib/noteSplit.ts"
      - "frontend/src/lib/tiptapNoteSplit.ts"
      - "frontend/src/lib/noteSplitApi.ts"
      - "frontend/src/lib/__tests__/noteSplit.test.ts"
      - "frontend/src/lib/__tests__/tiptapNoteSplit.test.ts"
      - "frontend/src/components/NoteSplitDialog.tsx"
      - "frontend/src/components/EditorPaneRuntime.tsx"
      - "frontend/src/components/__tests__/NoteSplitDialog.test.tsx"
      - ".github/workflows/note-split-ci.yml"

permissions:
  contents: read

jobs:
  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Split preview and selection tests
        run: >-
          npm run test:run --
          src/lib/__tests__/noteSplit.test.ts
          src/lib/__tests__/tiptapNoteSplit.test.ts
          src/components/__tests__/NoteSplitDialog.test.tsx
      - name: Frontend typecheck
        run: npx tsc -b

  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - name: Split planner and transaction tests
        run: >-
          node --import tsx --import ./tests/setup-db-isolation.ts --test
          tests/note-split.test.ts
          tests/note-split-title.test.ts
          tests/tiptap-note-split.test.ts
          tests/tiptap-note-split-empty.test.ts
      - name: Backend typecheck
        run: npm run build:tsc
