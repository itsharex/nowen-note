name: Note Split CI

on:
  push:
    branches: [main]
    paths:
      - "backend/src/lib/noteSplit.ts"
      - "backend/src/runtime/note-split.ts"
      - "backend/src/runtime/task-stats-hardening.ts"
      - "backend/tests/note-split.test.ts"
      - "frontend/vite.config.ts"
      - "frontend/src/lib/noteSplit.ts"
      - "frontend/src/lib/noteSplitApi.ts"
      - "frontend/src/lib/__tests__/noteSplit.test.ts"
      - "frontend/src/components/NoteSplitDialog.tsx"
      - "frontend/src/components/EditorPaneRuntime.tsx"
      - ".github/workflows/note-split-ci.yml"
  pull_request:
    paths:
      - "backend/src/lib/noteSplit.ts"
      - "backend/src/runtime/note-split.ts"
      - "backend/src/runtime/task-stats-hardening.ts"
      - "backend/tests/note-split.test.ts"
      - "frontend/vite.config.ts"
      - "frontend/src/lib/noteSplit.ts"
      - "frontend/src/lib/noteSplitApi.ts"
      - "frontend/src/lib/__tests__/noteSplit.test.ts"
      - "frontend/src/components/NoteSplitDialog.tsx"
      - "frontend/src/components/EditorPaneRuntime.tsx"
      - ".github/workflows/note-split-ci.yml"

permissions:
  contents: read

jobs:
  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Split preview tests
        run: npm run test:run -- src/lib/__tests__/noteSplit.test.ts
      - name: Frontend typecheck
        run: npx tsc -b

  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - name: Split planner tests
        run: node --import tsx --import ./tests/setup-db-isolation.ts --test tests/note-split.test.ts
      - name: Backend typecheck
        run: npm run build:tsc
