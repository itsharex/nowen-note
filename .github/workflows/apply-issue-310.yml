name: Apply Issue 310 Import Hub IA

on:
  push:
    paths:
      - ".github/workflows/apply-issue-310.yml"
      - ".github/scripts/apply-issue-310.mjs"

permissions:
  contents: write

concurrency:
  group: apply-issue-310-main
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Apply and validate migration
        shell: bash
        run: |
          set -o pipefail
          {
            node .github/scripts/apply-issue-310.mjs
            cd frontend
            npm ci
            npm run test:run -- src/lib/__tests__/importHub.test.ts
            npm run build
          } 2>&1 | tee /tmp/issue-310.log

      - name: Commit implementation to main
        if: success()
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            frontend/src/components/DataManager.tsx \
            frontend/src/components/YoudaoImport.tsx \
            frontend/src/components/YoudaoImportLegacy.tsx \
            frontend/src/lib/importHub.ts \
            frontend/src/lib/__tests__/importHub.test.ts \
            frontend/src/i18n/locales/zh-CN.json \
            frontend/src/i18n/locales/en.json
          git diff --cached --check
          git commit -m "feat(import): restructure import hub sources (#310)"
          git pull --rebase origin main
          git push origin HEAD:main

      - name: Record validation failure
        if: failure()
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          {
            echo "Issue #310 migration validation failed."
            echo
            echo "Workflow commit: $GITHUB_SHA"
            echo "Run: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
            echo
            echo "Last log lines:"
            echo '```text'
            if [ -f /tmp/issue-310.log ]; then
              tail -n 400 /tmp/issue-310.log
            else
              echo "No validation log was produced; checkout or setup failed before validation."
            fi
            echo '```'
          } > .github/issue-310-failure.md
          git add .github/issue-310-failure.md
          git commit -m "chore(issue-310): capture import hub migration failure"
          git pull --rebase origin main
          git push origin HEAD:main
