<!doctype html>
<html lang="zh-CN" class="dark">
  <head>
    <meta charset="UTF-8" />
    <!-- SEC-ELECTRON-01-E3.4: CSP — 保留严格默认策略，补齐 nowen-note 实际资源来源 -->
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src 'self' 'unsafe-inline' 'unsafe-eval';
      style-src 'self' 'unsafe-inline';
      img-src 'self' file: data: blob: http://127.0.0.1:* http://localhost:* https:;
      font-src 'self' data: blob: http://127.0.0.1:* http://localhost:* https:;
      connect-src 'self' http://127.0.0.1:* http://localhost:* https: ws://127.0.0.1:* ws://localhost:* wss:;
      frame-src 'self' blob: data: http://127.0.0.1:* http://localhost:* https:;
      media-src 'self' blob: data: http://127.0.0.1:* http://localhost:* https:;
      worker-src 'self' blob:;
      object-src 'none';
      base-uri 'self';
      form-action 'self';
      frame-ancestors 'none';
    " />
    <!-- Favicon：品牌蓝 + 白色笔记 + N 字母，替代 Vite 默认图标 -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- 老旧浏览器回退到品牌 PNG logo -->
    <link rel="alternate icon" type="image/svg+xml" href="/nowen-note-icon.svg" />
    <!-- iOS 添加到主屏幕 -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.svg" />
    <!-- 品牌主题色（地址栏/PWA） -->
    <meta name="theme-color" content="#2563EB" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <!-- 使用系统字体栈，避免依赖 Google Fonts CDN（国内 Android 设备可能加载超时） -->
    <title>nowen-note</title>
    <!--
      FOUC 防护：在 React 挂载前同步读取皮肤偏好并写入 <html data-skin="...">。
      next-themes 已处理明暗模式的首帧闪烁；此脚本只负责 skin 维度。
      注意：必须是同步内联脚本，不能放到外部文件，否则会被 <link modulepreload> 抢占在前。
    -->
    <script>
      (function () {
        try {
          var s = localStorage.getItem("nowen-note-skin");
          if (s === "macos") {
            document.documentElement.setAttribute("data-skin", "macos");
          }
        } catch (e) { /* 隐私模式 / localStorage 被禁：静默忽略，按默认皮肤渲染 */ }
      })();
    </script>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: #f8fafc;
      }

      .app-boot-splash {
        position: fixed;
        inset: 0;
        z-index: 999999;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: max(24px, env(safe-area-inset-top)) max(20px, env(safe-area-inset-right)) max(24px, env(safe-area-inset-bottom)) max(20px, env(safe-area-inset-left));
        box-sizing: border-box;
        background:
          radial-gradient(circle at 50% 30%, rgba(37, 99, 235, 0.08), transparent 32%),
          #f8fafc;
        color: #0f172a;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      }

      .app-boot-splash--leaving {
        opacity: 0;
        transition: opacity 0.18s ease;
        pointer-events: none;
      }

      .app-boot-card {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        width: min(280px, 100%);
        padding: 28px 32px;
        border: 1px solid rgba(148, 163, 184, 0.24);
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.86);
        box-shadow: 0 24px 80px rgba(15, 23, 42, 0.08);
        box-sizing: border-box;
        backdrop-filter: blur(16px);
      }

      .app-boot-logo {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 44px;
        height: 44px;
        border-radius: 14px;
        background: linear-gradient(135deg, #2563eb, #6366f1);
        color: #ffffff;
        font-size: 22px;
        font-weight: 800;
        box-shadow: 0 10px 30px rgba(37, 99, 235, 0.28);
      }

      .app-boot-title {
        font-size: 16px;
        font-weight: 700;
      }

      .app-boot-subtitle {
        font-size: 13px;
        color: #64748b;
        text-align: center;
      }

      .app-boot-spinner {
        width: 22px;
        height: 22px;
        margin-top: 4px;
        border: 2px solid rgba(37, 99, 235, 0.18);
        border-top-color: #2563eb;
        border-radius: 999px;
        animation: appBootSpin 0.8s linear infinite;
      }

      .app-boot-reload {
        display: none;
        align-items: center;
        justify-content: center;
        margin-top: 8px;
        padding: 8px 14px;
        border: 0;
        border-radius: 999px;
        background: #2563eb;
        color: #ffffff;
        font: inherit;
        font-size: 13px;
        cursor: pointer;
      }

      .beian-footer {
        position: fixed;
        left: max(12px, env(safe-area-inset-left));
        right: max(12px, env(safe-area-inset-right));
        bottom: max(8px, env(safe-area-inset-bottom));
        z-index: 60;
        display: none;
        justify-content: center;
        pointer-events: none;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      }

      .beian-footer.is-visible {
        display: flex;
      }

      .beian-footer a {
        pointer-events: auto;
        color: rgba(100, 116, 139, 0.86);
        font-size: 12px;
        line-height: 1.4;
        text-decoration: none;
        padding: 3px 8px;
        border-radius: 999px;
        background: rgba(248, 250, 252, 0.72);
        backdrop-filter: blur(10px);
      }

      .beian-footer a:hover {
        color: #2563eb;
      }

      @keyframes appBootSpin {
        to {
          transform: rotate(360deg);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .app-boot-spinner {
          animation: none;
        }

        .app-boot-splash--leaving {
          transition: none;
        }
      }

      @media (prefers-color-scheme: dark) {
        html,
        body {
          background: #0f172a;
        }

        .app-boot-splash {
          background:
            radial-gradient(circle at 50% 30%, rgba(99, 102, 241, 0.16), transparent 34%),
            #0f172a;
          color: #e5e7eb;
        }

        .app-boot-card {
          border-color: rgba(148, 163, 184, 0.22);
          background: rgba(15, 23, 42, 0.78);
          box-shadow: 0 24px 80px rgba(0, 0, 0, 0.28);
        }

        .app-boot-subtitle {
          color: #94a3b8;
        }

        .beian-footer a {
          color: rgba(148, 163, 184, 0.88);
          background: rgba(15, 23, 42, 0.62);
        }

        .beian-footer a:hover {
          color: #93c5fd;
        }
      }
    </style>
    <script>
      window.__NOWEN_BOOT_TIMER__ = window.setTimeout(function () {
        var reload = document.getElementById("app-boot-reload");
        var subtitle = document.querySelector(".app-boot-subtitle");
        if (subtitle) subtitle.textContent = "加载时间较长，请检查网络或刷新重试";
        if (reload) {
          reload.style.display = "inline-flex";
          reload.onclick = function () { window.location.reload(); };
        }
      }, 12000);
    </script>
  </head>
  <body>
    <div id="app-boot-splash" class="app-boot-splash">
      <div class="app-boot-card">
        <div class="app-boot-logo">N</div>
        <div class="app-boot-title">nowen-note</div>
        <div class="app-boot-subtitle">正在加载你的笔记…</div>
        <div class="app-boot-spinner"></div>
        <button id="app-boot-reload" class="app-boot-reload" type="button">刷新重试</button>
      </div>
    </div>
    <div id="root" style="height:100vh;width:100vw;overflow:hidden;"></div>
    <footer id="beian-footer" class="beian-footer" aria-label="ICP备案信息">
      <a id="beian-link" href="https://beian.miit.gov.cn/" target="_blank" rel="noopener noreferrer"></a>
    </footer>
    <script>
      (function () {
        var text = "%VITE_ICP_BEIAN_TEXT%".trim();
        var url = "%VITE_ICP_BEIAN_URL%".trim() || "https://beian.miit.gov.cn/";
        // Vite 未配置对应 env 时会保留占位符；此时保持隐藏，避免显示假备案号。
        if (!text || text.indexOf("VITE_ICP_BEIAN_TEXT") !== -1) return;
        // 备案号只面向 Web 站点展示；Electron / Capacitor 原生客户端不显示，避免压住客户端 UI。
        try {
          var isDesktop = !!(window.nowenDesktop && window.nowenDesktop.isDesktop);
          var isNative = !!(window.Capacitor && (
            (typeof window.Capacitor.isNativePlatform === "function" && window.Capacitor.isNativePlatform()) ||
            (window.Capacitor.platform && window.Capacitor.platform !== "web")
          ));
          if (isDesktop || isNative) return;
        } catch (e) { /* ignore */ }
        var footer = document.getElementById("beian-footer");
        var link = document.getElementById("beian-link");
        if (!footer || !link) return;
        link.textContent = text;
        link.href = url || "https://beian.miit.gov.cn/";
        footer.classList.add("is-visible");
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
